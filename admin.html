<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Administração GP Performance</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-zinc-950 text-white min-h-screen p-6">

<div class="max-w-7xl mx-auto">

<div class="mb-8">

<h1 class="text-5xl font-black italic">
ADMIN <span class="text-blue-500">GP PERFORMANCE</span>
</h1>

<p class="text-zinc-500 uppercase tracking-[5px] mt-2">
Gestão Consultores
</p>

</div>

<div class="bg-zinc-900 rounded-3xl p-6 mb-8">

<h2 class="text-3xl font-black mb-6">
Cadastrar / Editar
</h2>

<form id="form" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">

<input id="competencia" type="month"
class="bg-zinc-800 rounded-xl p-4 outline-none"/>

<input id="name" type="text" placeholder="Consultor"
class="bg-zinc-800 rounded-xl p-4 outline-none"/>

<input id="store" type="text" placeholder="Loja"
class="bg-zinc-800 rounded-xl p-4 outline-none"/>

<input id="rev_und" type="number" placeholder="Revisões"
class="bg-zinc-800 rounded-xl p-4 outline-none"/>

<input id="serv_adic" type="number" placeholder="Serviços"
class="bg-zinc-800 rounded-xl p-4 outline-none"/>

<input id="emb_oficina" type="number" placeholder="Embelezamento"
class="bg-zinc-800 rounded-xl p-4 outline-none"/>

<input id="hgsi" type="number" placeholder="HGSI"
class="bg-zinc-800 rounded-xl p-4 outline-none"/>

<input id="pesquisas" type="number" placeholder="Pesquisas"
class="bg-zinc-800 rounded-xl p-4 outline-none"/>

<input id="meta_pesquisas" type="number" placeholder="Meta Pesquisas"
class="bg-zinc-800 rounded-xl p-4 outline-none"/>

<button type="submit"
class="bg-blue-600 hover:bg-blue-700 rounded-xl p-4 font-black uppercase">

Salvar

</button>

</form>

</div>

<div class="bg-zinc-900 rounded-3xl p-6">

<h2 class="text-3xl font-black mb-6">
Consultores
</h2>

<div id="lista"></div>

</div>

</div>

<script type="module">

import { db } from './firebase-config.js';

import {
collection,
addDoc,
onSnapshot,
deleteDoc,
updateDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const form = document.getElementById('form');
const lista = document.getElementById('lista');

let editingId = null;

form.addEventListener('submit', async (e)=>{

e.preventDefault();

const payload = {

competencia:
document.getElementById('competencia').value,

name:
document.getElementById('name').value,

store:
document.getElementById('store').value,

rev_und:
Number(document.getElementById('rev_und').value),

serv_adic:
Number(document.getElementById('serv_adic').value),

emb_oficina:
Number(document.getElementById('emb_oficina').value),

hgsi:
Number(document.getElementById('hgsi').value),

pesquisas:
Number(document.getElementById('pesquisas').value),

meta_pesquisas:
Number(document.getElementById('meta_pesquisas').value)

};

if(editingId){

await updateDoc(
doc(db,"consultores",editingId),
payload
);

editingId = null;

}else{

await addDoc(
collection(db,"consultores"),
payload
);

}

form.reset();

});

onSnapshot(collection(db,"consultores"),(snapshot)=>{

lista.innerHTML = '';

snapshot.forEach((docSnap)=>{

const c = docSnap.data();

lista.innerHTML += `

<div class="bg-zinc-800 rounded-2xl p-5 mb-4">

<div class="flex flex-col xl:flex-row xl:items-center xl:justify-between gap-6">

<div>

<div class="text-2xl font-black uppercase">
${c.name}
</div>

<div class="text-zinc-500 uppercase">
${c.store}
</div>

<div class="text-blue-400 mt-2">
${c.competencia}
</div>

</div>

<div class="flex gap-3">

<button
onclick="editarConsultor(
'${docSnap.id}',
'${c.competencia}',
'${c.name}',
'${c.store}',
${c.rev_und},
${c.serv_adic},
${c.emb_oficina},
${c.hgsi},
${c.pesquisas},
${c.meta_pesquisas}
)"
class="bg-yellow-500 hover:bg-yellow-600 px-5 py-3 rounded-xl font-black">

Editar

</button>

<button
onclick="excluirConsultor('${docSnap.id}')"
class="bg-red-600 hover:bg-red-700 px-5 py-3 rounded-xl font-black">

Excluir

</button>

</div>

</div>

</div>

`;

});

});

window.editarConsultor = (
id,
competencia,
name,
store,
rev_und,
serv_adic,
emb_oficina,
hgsi,
pesquisas,
meta_pesquisas
)=>{

editingId = id;

document.getElementById('competencia').value = competencia;
document.getElementById('name').value = name;
document.getElementById('store').value = store;
document.getElementById('rev_und').value = rev_und;
document.getElementById('serv_adic').value = serv_adic;
document.getElementById('emb_oficina').value = emb_oficina;
document.getElementById('hgsi').value = hgsi;
document.getElementById('pesquisas').value = pesquisas;
document.getElementById('meta_pesquisas').value = meta_pesquisas;

window.scrollTo({
top:0,
behavior:'smooth'
});

};

window.excluirConsultor = async(id)=>{

const confirmar =
confirm('Deseja excluir?');

if(!confirmar) return;

await deleteDoc(
doc(db,"consultores",id)
);

};

</script>

</body>

</html>
