<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin GP Performance</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] text-white min-h-screen p-6">
<div class="max-w-7xl mx-auto">
<div class="flex justify-between items-center mb-10">
<div>
<h1 class="text-5xl font-black italic">ADMIN <span class="text-blue-500">GP PERFORMANCE</span></h1>
<p class="text-slate-500 uppercase tracking-[5px] mt-2">Gestão de Consultores e Ganhadores</p>
</div>
</div>

<!-- Ganhadores Semanais -->
<div class="bg-slate-900 rounded-3xl p-8 mb-10 border border-slate-800">
<h2 class="text-3xl font-black mb-6">Cadastrar Ganhadores Semanais</h2>
<div class="grid grid-cols-1 md:grid-cols-3 gap-5">
<input id="ganhador_competencia" type="month" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
<select id="ganhador_semana" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
<option value="S1">Semana 1</option><option value="S2">Semana 2</option><option value="S3">Semana 3</option><option value="S4">Semana 4</option>
</select>
<input id="ganhador_1" placeholder="1º Colocado" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
<input id="ganhador_2" placeholder="2º Colocado" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
<input id="ganhador_3" placeholder="3º Colocado" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
<input id="ganhador_loja" placeholder="Loja" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
</div>
<button id="salvarGanhadorBtn" class="bg-emerald-600 hover:bg-emerald-700 mt-6 px-10 py-4 rounded-2xl font-black">SALVAR GANHADORES</button>
</div>

<!-- Form Consultores -->
<div class="bg-slate-900 rounded-3xl p-8 mb-10 border border-slate-800">
<h2 class="text-3xl font-black mb-8">Cadastrar Resultado Mensal</h2>
<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-5">
<input id="name" placeholder="Nome Consultor" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
<input id="store" placeholder="Loja" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
<select id="marca" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
<option value="Hyundai">Hyundai</option><option value="Renault">Renault</option>
</select>
<input id="competencia" type="month" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
<input id="rev_und" type="number" placeholder="REV" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
<input id="serv_adic" type="number" placeholder="Serviços Adicionais" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
<input id="emb_oficina" type="number" placeholder="Embelezamento" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
<input id="hgsi_nps" type="number" placeholder="HGSI / NPS" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
<input id="pesquisas" type="number" placeholder="Pesquisas" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
<input id="meta_pesquisas" type="number" placeholder="Meta" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
</div>
<div class="flex gap-4 mt-8">
<button id="salvarBtn" class="bg-blue-600 hover:bg-blue-700 px-10 py-4 rounded-2xl font-black">SALVAR RESULTADO</button>
</div>
</div>

<!-- Lista -->
<div class="bg-slate-900 rounded-3xl p-8 border border-slate-800">
<table class="w-full table-fixed">
<thead><tr class="border-b border-slate-800 text-slate-400 uppercase text-sm"><th class="text-left py-4">Consultor</th><th class="text-left">Marca</th><th class="text-center">Indicador</th><th class="text-center">Ações</th></tr></thead>
<tbody id="listaConsultores"></tbody>
</table>
</div>
</div>

<script type="module">
import { db } from './firebase-config.js';
import { collection, addDoc, setDoc, doc, onSnapshot, deleteDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const marcaSelect = document.getElementById('marca');
const hgsiInput = document.getElementById('hgsi_nps');

marcaSelect.addEventListener('change', (e) => {
  hgsiInput.placeholder = e.target.value === 'Hyundai' ? 'HGSI' : 'NPS';
});

document.getElementById('salvarBtn').addEventListener('click', async () => {
  const dados = {
    name: document.getElementById('name').value,
    store: document.getElementById('store').value,
    marca: marcaSelect.value,
    competencia: document.getElementById('competencia').value,
    valor_indicador: Number(hgsiInput.value),
    rev_und: Number(document.getElementById('rev_und').value),
    serv_adic: Number(document.getElementById('serv_adic').value),
    emb_oficina: Number(document.getElementById('emb_oficina').value),
    pesquisas: Number(document.getElementById('pesquisas').value),
    meta_pesquisas: Number(document.getElementById('meta_pesquisas').value)
  };

  const q = query(collection(db, "consultores"), where("name", "==", dados.name), where("competencia", "==", dados.competencia), where("marca", "==", dados.marca));
  const snap = await getDocs(q);
  if (!snap.empty) return alert("Duplicidade detectada!");
  await addDoc(collection(db, "consultores"), dados);
  alert("Salvo com sucesso");
});

document.getElementById('salvarGanhadorBtn').addEventListener('click', async () => {
  const comp = document.getElementById('ganhador_competencia').value;
  const sem = document.getElementById('ganhador_semana').value;
  await setDoc(doc(db, "ganhadores_semanais", `${comp}_${sem}`), {
    p1: document.getElementById('ganhador_1').value,
    p2: document.getElementById('ganhador_2').value,
    p3: document.getElementById('ganhador_3').value,
    loja: document.getElementById('ganhador_loja').value
  });
  alert("Ganhadores salvos");
});
</script>
</body>
</html>
