<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Admin GP Performance</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-[#020617] text-white min-h-screen p-6"><div class="max-w-7xl mx-auto"><div class="flex justify-between items-center mb-10"><div><h1 class="text-5xl font-black italic">ADMIN <span class="text-blue-500">GP PERFORMANCE</span></h1><p class="text-slate-500 uppercase tracking-[5px] mt-2">Gestão de Consultores</p></div></div><div class="bg-slate-900 rounded-3xl p-8 mb-10 border border-slate-800"><div class="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-6 mb-8"><h2 class="text-3xl font-black">Cadastrar Resultado Mensal</h2></div><div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-5"><select id="marca" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none"><option value="Hyundai">Hyundai</option><option value="Renault">Renault</option></select><input id="name" placeholder="Nome Consultor" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none"><input id="store" placeholder="Loja" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none"><input id="competencia" type="month" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none"><input id="rev_und" type="number" placeholder="REV" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none"><input id="serv_adic" type="number" placeholder="Serviços Adicionais" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none"><input id="emb_oficina" type="number" placeholder="Embelezamento" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none"><input id="indicador" type="number" placeholder="HGSI/NPS" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none"><input id="pesquisas" type="number" placeholder="Pesquisas" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none"><input id="meta_pesquisas" type="number" placeholder="Meta Pesquisas" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none"></div><div class="flex gap-4 mt-8"><button id="salvarBtn" class="bg-blue-600 hover:bg-blue-700 transition-all px-10 py-4 rounded-2xl text-2xl font-black">SALVAR RESULTADO</button></div></div><div class="bg-slate-900 rounded-3xl p-8 mb-10 border border-slate-800"><h2 class="text-3xl font-black mb-6">Ganhadores Semanais</h2><div class="grid grid-cols-1 md:grid-cols-3 gap-5"><input id="ganhador_comp" type="month" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none"><select id="semana" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none"><option value="S1">Semana 1</option><option value="S2">Semana 2</option><option value="S3">Semana 3</option><option value="S4">Semana 4</option></select><input id="ganhadores_nomes" placeholder="1º, 2º, 3º (Nomes/Lojas)" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none"></div><button id="salvarGanhadorBtn" class="bg-green-600 hover:bg-green-700 mt-5 px-10 py-4 rounded-2xl text-xl font-black">SALVAR GANHADORES</button></div><div class="bg-slate-900 rounded-3xl p-8 border border-slate-800"><div class="flex justify-between items-center mb-8"><h2 class="text-3xl font-black">HISTÓRICO</h2><input id="mesFiltro" type="month" class="bg-slate-800 border-2 border-blue-500 rounded-2xl p-3 text-lg outline-none"></div><table class="w-full"><thead><tr class="text-slate-400 uppercase text-sm border-b border-slate-800"><th class="text-left py-4">Consultor</th><th>Marca</th><th>Competência</th><th>Indicador</th><th>Ações</th></tr></thead><tbody id="listaConsultores"></tbody></table></div></div><script type="module">import { db } from './firebase-config.js'; import { collection, addDoc, onSnapshot, doc, setDoc, getDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"; const marcaSelect = document.getElementById('marca'); const indicadorInput = document.getElementById('indicador'); marcaSelect.addEventListener('change', () => { indicadorInput.placeholder = marcaSelect.value === 'Hyundai' ? 'HGSI' : 'NPS'; }); document.getElementById('salvarBtn').addEventListener('click', async () => { const data = { name: document.getElementById('name').value, store: document.getElementById('store').value, competencia: document.getElementById('competencia').value, marca: marcaSelect.value, indicador: Number(indicadorInput.value), rev: Number(document.getElementById('rev_und').value), serv: Number(document.getElementById('serv_adic').value), emb: Number(document.getElementById('emb_oficina').value), pesq: Number(document.getElementById('pesquisas').value), meta: Number(document.getElementById('meta_pesquisas').value) }; const q = query(collection(db, "consultores"), where("name", "==", data.name), where("competencia", "==", data.competencia), where("marca", "==", data.marca)); const snap = await getDocs(q); if (!snap.empty) return alert("Duplicidade detectada!"); await addDoc(collection(db, "consultores"), data); alert("Salvo!"); }); document.getElementById('salvarGanhadorBtn').addEventListener('click', async () => { const comp = document.getElementById('ganhador_comp').value; const sem = document.getElementById('semana').value; await setDoc(doc(db, "ganhadores_semanais", `${comp}_${sem}`), { nomes: document.getElementById('ganhadores_nomes').value }); alert("Ganhadores salvos!"); });</script></body></html>
