<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Admin GP Performance</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-[#020617] text-white min-h-screen p-6"><div class="max-w-7xl mx-auto"><div class="flex justify-between items-center mb-10"><div><h1 class="text-5xl font-black italic">ADMIN <span class="text-blue-500">GP PERFORMANCE</span></h1><p class="text-slate-500 uppercase tracking-[5px] mt-2">Gestão de Consultores e Ganhadores</p></div></div><div class="bg-slate-900 rounded-3xl p-8 mb-10 border border-slate-800"><h2 class="text-3xl font-black mb-6">Cadastrar Resultado Mensal</h2><div class="grid grid-cols-1 md:grid-cols-3 xl:grid-cols-4 gap-5"><select id="marca" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none"><option value="Hyundai">Hyundai (HGSI)</option><option value="Renault">Renault (NPS)</option></select><input id="name" placeholder="Nome Consultor" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none"><input id="store" placeholder="Loja" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none"><input id="competencia" type="month" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none"><input id="rev_und" type="number" placeholder="REV" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none"><input id="serv_adic" type="number" placeholder="Serviços Adicionais" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none"><input id="emb_oficina" type="number" placeholder="Embelezamento" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none"><input id="indicador" type="number" placeholder="HGSI/NPS" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none"><input id="pesquisas" type="number" placeholder="Pesquisas" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none"><input id="meta_pesquisas" type="number" placeholder="Meta" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none"></div><div class="flex gap-4 mt-8"><button id="salvarBtn" class="bg-blue-600 hover:bg-blue-700 transition-all px-10 py-4 rounded-2xl text-2xl font-black">SALVAR RESULTADO</button><button id="cancelarBtn" class="bg-slate-700 hover:bg-slate-600 transition-all px-10 py-4 rounded-2xl text-2xl font-black hidden">CANCELAR</button></div></div><div class="bg-slate-900 rounded-3xl p-8 mb-10 border border-slate-800"><h2 class="text-3xl font-black mb-6">Ganhadores Semanais</h2><div class="grid grid-cols-1 md:grid-cols-3 gap-4"><input id="ganhador_mes" type="month" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none"><select id="semana" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none"><option value="S1">Semana 1</option><option value="S2">Semana 2</option><option value="S3">Semana 3</option><option value="S4">Semana 4</option></select><input id="g1" placeholder="1º Colocado" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none"><input id="g2" placeholder="2º Colocado" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none"><input id="g3" placeholder="3º Colocado" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none"></div><button id="salvarGanhador" class="mt-6 bg-green-600 hover:bg-green-700 px-8 py-3 rounded-2xl font-black">SALVAR GANHADORES</button></div><div class="bg-slate-900 rounded-3xl p-8 border border-slate-800"><div class="flex justify-between items-center mb-8"><h2 class="text-3xl font-black">HISTÓRICO</h2><input id="mesFiltro" type="month" class="bg-slate-800 border-2 border-blue-500 rounded-2xl p-3 text-lg font-bold outline-none"></div><table class="w-full"><thead><tr class="text-slate-400 uppercase text-sm border-b border-slate-800"><th class="py-4 text-left">Consultor</th><th class="text-left">Marca</th><th class="text-center">Indicador</th><th class="text-center">Ações</th></tr></thead><tbody id="listaConsultores"></tbody></table></div></div><script type="module">import { db } from './firebase-config.js'; import { collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, setDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"; const lista = document.getElementById('listaConsultores'); const salvarBtn = document.getElementById('salvarBtn'); const mesFiltro = document.getElementById('mesFiltro'); const campos = { name: document.getElementById('name'), store: document.getElementById('store'), competencia: document.getElementById('competencia'), rev_und: document.getElementById('rev_und'), serv_adic: document.getElementById('serv_adic'), emb_oficina: document.getElementById('emb_oficina'), indicador: document.getElementById('indicador'), pesquisas: document.getElementById('pesquisas'), meta_pesquisas: document.getElementById('meta_pesquisas'), marca: document.getElementById('marca') }; let editandoId = null; async function salvar(){ const dados = { name: campos.name.value, store: campos.store.value, competencia: campos.competencia.value, rev_und: Number(campos.rev_und.value), serv_adic: Number(campos.serv_adic.value), emb_oficina: Number(campos.emb_oficina.value), indicador: Number(campos.indicador.value), pesquisas: Number(campos.pesquisas.value), meta_pesquisas: Number(campos.meta_pesquisas.value), marca: campos.marca.value, ferias: false }; if(editandoId){ await updateDoc(doc(db, "consultores", editandoId), dados); editandoId = null; salvarBtn.innerText = "SALVAR RESULTADO"; } else { await addDoc(collection(db, "consultores"), dados); } alert("Salvo com sucesso!"); } window.editarConsultor = (id) => { const c = window.todosDados.find(x => x.id === id); editandoId = id; Object.keys(campos).forEach(k => { if(campos[k]) campos[k].value = c[k] || ''; }); salvarBtn.innerText = "ATUALIZAR RESULTADO"; }; window.toggleFerias = async (id, status) => { await updateDoc(doc(db, "consultores", id), { ferias: !status }); }; window.excluirConsultor = async (id) => { if(confirm("Excluir?")) await deleteDoc(doc(db, "consultores", id)); }; document.getElementById('salvarGanhador').addEventListener('click', async () => { const id = `${document.getElementById('ganhador_mes').value}_${document.getElementById('semana').value}`; await setDoc(doc(db, "ganhadores_semanais", id), { g1: document.getElementById('g1').value, g2: document.getElementById('g2').value, g3: document.getElementById('g3').value }); alert("Ganhadores salvos!"); }); salvarBtn.addEventListener('click', salvar); onSnapshot(collection(db, "consultores"), (snap) => { window.todosDados = []; snap.forEach(d => window.todosDados.push({id: d.id, ...d.data()})); render(); }); function render(){ lista.innerHTML = ''; window.todosDados.filter(c => c.competencia === mesFiltro.value).forEach(c => { lista.innerHTML += `<tr class="border-b border-slate-800"><td>${c.name}</td><td>${c.marca}</td><td class="text-center">${c.indicador}</td><td class="text-center"><button onclick="editarConsultor('${c.id}')" class="bg-yellow-600 px-3 py-1 rounded">Editar</button> <button onclick="excluirConsultor('${c.id}')" class="bg-red-600 px-3 py-1 rounded">Excluir</button></td></tr>`; }); } mesFiltro.addEventListener('change', render);</script></body></html>
