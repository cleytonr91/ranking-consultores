<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Admin GP Performance</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#020617] text-white min-h-screen p-6">

<div class="max-w-7xl mx-auto">

<div class="flex justify-between items-center mb-10">

<div>

<h1 class="text-5xl font-black italic">
ADMIN <span class="text-blue-500">GP PERFORMANCE</span>
</h1>

<p class="text-slate-500 uppercase tracking-[5px] mt-2">
Gestão de Consultores
</p>

</div>

</div>

<!-- FORM -->

<div class="bg-slate-900 rounded-3xl p-8 mb-10 border border-slate-800">

<h2 class="text-3xl font-black mb-8">
Cadastrar Resultado Mensal
</h2>

<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-5">

<input id="name" placeholder="Nome Consultor"
class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none">

<input id="store" placeholder="Loja"
class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none">

<input id="competencia" type="month"
class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none">

<input id="rev_und" type="number" placeholder="REV"
class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none">

<input id="serv_adic" type="number" placeholder="Serviços Adicionais"
class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none">

<input id="emb_oficina" type="number" placeholder="Embelezamento"
class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none">

<input id="hgsi" type="number" placeholder="HGSI"
class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none">

<input id="pesquisas" type="number" placeholder="Pesquisas Realizadas"
class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none">

<input id="meta_pesquisas" type="number" placeholder="Meta Pesquisas"
class="bg-slate-950 border border-slate-700 rounded-2xl p-4 text-xl outline-none">

</div>

<div class="flex gap-4 mt-8">

<button
id="salvarBtn"
class="bg-blue-600 hover:bg-blue-700 transition-all px-10 py-4 rounded-2xl text-2xl font-black">

SALVAR RESULTADO

</button>

<button
id="cancelarBtn"
class="bg-slate-700 hover:bg-slate-600 transition-all px-10 py-4 rounded-2xl text-2xl font-black hidden">

CANCELAR EDIÇÃO

</button>

</div>

</div>

<!-- LISTA -->

<div class="bg-slate-900 rounded-3xl p-8 border border-slate-800">

<div class="flex justify-between items-center mb-8">

<h2 class="text-3xl font-black">
Histórico de Resultados
</h2>

</div>

<div class="w-full">

<table class="w-full table-fixed">

<thead>

<tr class="border-b border-slate-800 text-slate-400 uppercase text-sm">

<th class="text-left py-4 w-[16%]">Consultor</th>
<th class="text-left w-[14%]">Loja</th>
<th class="text-left w-[10%]">Competência</th>
<th class="text-center w-[6%]">REV</th>
<th class="text-center w-[11%]">Serviços</th>
<th class="text-center w-[11%]">Embelezamento</th>
<th class="text-center w-[6%]">HGSI</th>
<th class="text-center w-[7%]">Pesquisas</th>
<th class="text-center w-[6%]">Meta</th>
<th class="text-center w-[13%]">Ações</th>

</tr>

</thead>

<tbody id="listaConsultores">

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { db } from './firebase-config.js';

import {

collection,
addDoc,
onSnapshot,
deleteDoc,
doc,
updateDoc,
query,
where,
getDocs

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const lista =
document.getElementById('listaConsultores');

const salvarBtn =
document.getElementById('salvarBtn');

const cancelarBtn =
document.getElementById('cancelarBtn');

let editandoId = null;

const campos = {

name:
document.getElementById('name'),

store:
document.getElementById('store'),

competencia:
document.getElementById('competencia'),

rev_und:
document.getElementById('rev_und'),

serv_adic:
document.getElementById('serv_adic'),

emb_oficina:
document.getElementById('emb_oficina'),

hgsi:
document.getElementById('hgsi'),

pesquisas:
document.getElementById('pesquisas'),

meta_pesquisas:
document.getElementById('meta_pesquisas')

};

async function salvar(){

const dados = {

name:
campos.name.value.trim(),

store:
campos.store.value.trim(),

competencia:
campos.competencia.value,

rev_und:
Number(campos.rev_und.value),

serv_adic:
Number(campos.serv_adic.value),

emb_oficina:
Number(campos.emb_oficina.value),

hgsi:
Number(campos.hgsi.value),

pesquisas:
Number(campos.pesquisas.value),

meta_pesquisas:
Number(campos.meta_pesquisas.value)

};

if(
!dados.name ||
!dados.store ||
!dados.competencia
){

alert('Preencha os campos obrigatórios.');

return;

}

if(editandoId){

await updateDoc(
doc(db,"consultores",editandoId),
dados
);

alert('Resultado atualizado com sucesso.');

editandoId = null;

salvarBtn.innerText =
'SALVAR RESULTADO';

cancelarBtn.classList.add('hidden');

}else{

const consulta = query(
collection(db,"consultores"),
where("name","==",dados.name),
where("competencia","==",dados.competencia)
);

const existente =
await getDocs(consulta);

if(!existente.empty){

alert(
'Já existe resultado deste consultor nesta competência.'
);

return;

}

await addDoc(
collection(db,"consultores"),
dados
);

alert('Resultado salvo com sucesso.');

}

limparCampos();

}

function limparCampos(){

Object.values(campos).forEach(c=>{

c.value = '';

});

}

cancelarBtn.addEventListener('click',()=>{

editandoId = null;

salvarBtn.innerText =
'SALVAR RESULTADO';

cancelarBtn.classList.add('hidden');

limparCampos();

});

salvarBtn.addEventListener('click',salvar);

onSnapshot(collection(db,"consultores"),(snapshot)=>{

lista.innerHTML = '';

const dados = [];

snapshot.forEach((docu)=>{

dados.push({

id:docu.id,
...docu.data()

});

});

dados.sort((a,b)=>{

if(a.competencia > b.competencia) return -1;
if(a.competencia < b.competencia) return 1;

return a.name.localeCompare(b.name);

});

dados.forEach((c)=>{

lista.innerHTML += `

<tr class="border-b border-slate-800 hover:bg-slate-800/30 transition-all">

<td class="py-5 font-black text-lg uppercase break-words leading-tight pr-2">
${c.name}
</td>

<td class="uppercase text-slate-400 break-words text-sm leading-tight pr-2">
${c.store}
</td>

<td class="uppercase text-blue-400 font-black">
${c.competencia}
</td>

<td class="text-center">
${c.rev_und}
</td>

<td class="text-center text-cyan-400 font-black">
R$ ${c.serv_adic.toLocaleString('pt-BR')}
</td>

<td class="text-center text-pink-400 font-black">
R$ ${c.emb_oficina.toLocaleString('pt-BR')}
</td>

<td class="text-center font-black
${c.hgsi >= 970
? 'text-green-400'
: c.hgsi >= 960
? 'text-yellow-400'
: 'text-red-500'}
">

${c.hgsi}

</td>

<td class="text-center">
${c.pesquisas}
</td>

<td class="text-center">
${c.meta_pesquisas}
</td>

<td class="text-center">

<div class="flex flex-col xl:flex-row justify-center gap-2">

<button
class="bg-yellow-500 hover:bg-yellow-600 transition-all px-3 py-2 rounded-xl font-black text-sm"
onclick="editarConsultor('${c.id}')">

Editar

</button>

<button
class="bg-red-600 hover:bg-red-700 transition-all px-3 py-2 rounded-xl font-black text-sm"
onclick="excluirConsultor('${c.id}')">

Excluir

</button>

</div>

</td>

</tr>

`;

window.editarConsultor = (id)=>{

const consultor =
dados.find(c=>c.id === id);

editandoId = id;

campos.name.value =
consultor.name;

campos.store.value =
consultor.store;

campos.competencia.value =
consultor.competencia;

campos.rev_und.value =
consultor.rev_und;

campos.serv_adic.value =
consultor.serv_adic;

campos.emb_oficina.value =
consultor.emb_oficina;

campos.hgsi.value =
consultor.hgsi;

campos.pesquisas.value =
consultor.pesquisas;

campos.meta_pesquisas.value =
consultor.meta_pesquisas;

salvarBtn.innerText =
'ATUALIZAR RESULTADO';

cancelarBtn.classList.remove('hidden');

window.scrollTo({
top:0,
behavior:'smooth'
});

};

window.excluirConsultor = async(id)=>{

const confirmar =
confirm('Deseja realmente excluir este resultado?');

if(!confirmar) return;

await deleteDoc(
doc(db,"consultores",id)
);

};

});

});

</script>

</body>

</html>
