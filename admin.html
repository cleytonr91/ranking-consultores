<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Administração Consultores</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-zinc-950 text-white min-h-screen p-6">

<div class="max-w-6xl mx-auto">

<!-- TOPO -->

<div class="mb-8">

<h1 class="text-5xl font-black italic">
ADMIN <span class="text-blue-500">GP PERFORMANCE</span>
</h1>

<p class="text-zinc-500 uppercase tracking-[5px] mt-2">
Gerenciamento de Consultores
</p>

</div>

<!-- FORMULÁRIO -->

<div class="bg-zinc-900 rounded-2xl p-6 mb-8">

<h2 class="text-2xl font-black mb-6">
Cadastrar / Editar Consultor
</h2>

<form id="form" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">

<input
id="name"
type="text"
placeholder="Nome do Consultor"
class="bg-zinc-800 rounded-xl p-4 outline-none"
/>

<input
id="store"
type="text"
placeholder="Loja"
class="bg-zinc-800 rounded-xl p-4 outline-none"
/>

<input
id="rev_und"
type="number"
placeholder="Revisões"
class="bg-zinc-800 rounded-xl p-4 outline-none"
/>

<input
id="serv_adic"
type="number"
placeholder="Serviços Adicionais"
class="bg-zinc-800 rounded-xl p-4 outline-none"
/>

<input
id="emb_oficina"
type="number"
placeholder="Embelezamento Oficina"
class="bg-zinc-800 rounded-xl p-4 outline-none"
/>

<input
id="hgsi"
type="number"
placeholder="HGSI"
class="bg-zinc-800 rounded-xl p-4 outline-none"
/>

<input
id="pesquisas"
type="number"
placeholder="Pesquisas"
class="bg-zinc-800 rounded-xl p-4 outline-none"
/>

<input
id="meta_pesquisas"
type="number"
placeholder="Meta Pesquisas"
class="bg-zinc-800 rounded-xl p-4 outline-none"
/>

<button
type="submit"
class="bg-blue-600 hover:bg-blue-700 rounded-xl p-4 font-black uppercase transition-all"
>

Salvar Consultor

</button>

</form>

</div>

<!-- LISTA -->

<div>

<h2 class="text-3xl font-black mb-6">
Consultores Cadastrados
</h2>

<div id="lista"></div>

</div>

</div>

<script type="module">

import { db } from './firebase-config.js';

import {
collection,
addDoc,
onSnapshot,
deleteDoc,
updateDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const form = document.getElementById('form');
const lista = document.getElementById('lista');

let editingId = null;

form.addEventListener('submit', async (e) => {

e.preventDefault();

const name =
document.getElementById('name').value;

const store =
document.getElementById('store').value;

const rev_und =
Number(document.getElementById('rev_und').value);

const serv_adic =
Number(document.getElementById('serv_adic').value);

const emb_oficina =
Number(document.getElementById('emb_oficina').value);

const hgsi =
Number(document.getElementById('hgsi').value);

const pesquisas =
Number(document.getElementById('pesquisas').value);

const meta_pesquisas =
Number(document.getElementById('meta_pesquisas').value);

const payload = {
name,
store,
rev_und,
serv_adic,
emb_oficina,
hgsi,
pesquisas,
meta_pesquisas
};

if(editingId){

await updateDoc(
doc(db, "consultores", editingId),
payload
);

editingId = null;

}else{

await addDoc(
collection(db, "consultores"),
payload
);

}

form.reset();

});

onSnapshot(collection(db, "consultores"), (snapshot) => {

lista.innerHTML = '';

snapshot.forEach((docSnap) => {

const c = docSnap.data();

lista.innerHTML += `

<div class="bg-zinc-900 rounded-2xl p-6 mb-4">

<div class="flex flex-col xl:flex-row xl:items-center xl:justify-between gap-6">

<div>

<div class="text-2xl font-black uppercase">
${c.name}
</div>

<div class="text-zinc-500 uppercase tracking-wider">
${c.store}
</div>

</div>

<div class="grid grid-cols-2 md:grid-cols-4 gap-4">

<div class="bg-zinc-800 rounded-xl p-4 text-center">

<div class="text-zinc-500 text-xs uppercase">
REV
</div>

<div class="text-2xl font-black mt-2">
${c.rev_und}
</div>

</div>

<div class="bg-zinc-800 rounded-xl p-4 text-center">

<div class="text-zinc-500 text-xs uppercase">
Faturamento
</div>

<div class="text-2xl font-black text-blue-400 mt-2">
R$ ${(c.serv_adic + c.emb_oficina).toFixed(0)}
</div>

</div>

<div class="bg-zinc-800 rounded-xl p-4 text-center">

<div class="text-zinc-500 text-xs uppercase">
HGSI
</div>

<div class="text-2xl font-black mt-2
${c.hgsi >= 970
? 'text-green-400'
: c.hgsi >= 960
? 'text-yellow-400'
: 'text-red-500'}
">

${c.hgsi}

</div>

</div>

<div class="bg-zinc-800 rounded-xl p-4 text-center">

<div class="text-zinc-500 text-xs uppercase">
Meta
</div>

<div class="text-2xl font-black mt-2">

${c.meta_pesquisas > 0
? ((c.pesquisas / c.meta_pesquisas) * 100).toFixed(0)
: 0}%

</div>

</div>

</div>

<div class="flex gap-3">

<button
onclick="editarConsultor(
'${docSnap.id}',
'${c.name}',
'${c.store}',
${c.rev_und},
${c.serv_adic},
${c.emb_oficina},
${c.hgsi},
${c.pesquisas},
${c.meta_pesquisas}
)"
class="bg-yellow-500 hover:bg-yellow-600 px-5 py-3 rounded-xl font-black transition-all"
>

Editar

</button>

<button
onclick="excluirConsultor('${docSnap.id}')"
class="bg-red-600 hover:bg-red-700 px-5 py-3 rounded-xl font-black transition-all"
>

Excluir

</button>

</div>

</div>

</div>

`;

});

});

window.editarConsultor = (
id,
name,
store,
rev_und,
serv_adic,
emb_oficina,
hgsi,
pesquisas,
meta_pesquisas
) => {

editingId = id;

document.getElementById('name').value = name;
document.getElementById('store').value = store;
document.getElementById('rev_und').value = rev_und;
document.getElementById('serv_adic').value = serv_adic;
document.getElementById('emb_oficina').value = emb_oficina;
document.getElementById('hgsi').value = hgsi;
document.getElementById('pesquisas').value = pesquisas;
document.getElementById('meta_pesquisas').value = meta_pesquisas;

window.scrollTo({
top: 0,
behavior: 'smooth'
});

};

window.excluirConsultor = async (id) => {

const confirmar =
confirm('Deseja realmente excluir este consultor?');

if(!confirmar) return;

await deleteDoc(
doc(db, "consultores", id)
);

};

</script>

</body>

</html>
