<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin GP Performance</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] text-white min-h-screen p-6">
<div class="max-w-7xl mx-auto">
<div class="flex justify-between items-center mb-10">
<div><h1 class="text-5xl font-black italic">ADMIN <span class="text-blue-500">GP PERFORMANCE</span></h1><p class="text-slate-500 uppercase tracking-[5px] mt-2">Gestão de Consultores</p></div>
</div>

<div class="bg-slate-900 rounded-3xl p-8 mb-10 border border-slate-800">
<h2 class="text-3xl font-black mb-6">Cadastrar Resultado Mensal</h2>
<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-5">
<input id="name" placeholder="Nome Consultor" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
<input id="store" placeholder="Loja" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
<input id="competencia" type="month" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
<select id="marca" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
<option value="Hyundai">Hyundai</option>
<option value="Renault">Renault</option>
</select>
<input id="rev_und" type="number" placeholder="REV" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
<input id="serv_adic" type="number" placeholder="Serviços Adicionais" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
<input id="emb_oficina" type="number" placeholder="Embelezamento" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
<input id="indicador" type="number" placeholder="HGSI / NPS" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
<input id="pesquisas" type="number" placeholder="Pesquisas" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
<input id="meta_pesquisas" type="number" placeholder="Meta" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
</div>
<div class="flex gap-4 mt-8">
<button id="salvarBtn" class="bg-blue-600 hover:bg-blue-700 px-10 py-4 rounded-2xl font-black">SALVAR RESULTADO</button>
<button id="cancelarBtn" class="bg-slate-700 hover:bg-slate-600 px-10 py-4 rounded-2xl font-black hidden">CANCELAR</button>
</div>
</div>

<div class="bg-slate-900 rounded-3xl p-8 border border-slate-800 mb-10">
<h2 class="text-3xl font-black mb-6">Ganhadores Semanais</h2>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<input id="g_comp" type="month" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
<select id="g_semana" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
<option value="S1">Semana 1</option><option value="S2">Semana 2</option><option value="S3">Semana 3</option><option value="S4">Semana 4</option>
</select>
<input id="g_nomes" placeholder="1º, 2º, 3º (Separados por vírgula)" class="bg-slate-950 border border-slate-700 rounded-2xl p-4 outline-none">
<button id="salvarGanhador" class="bg-green-600 hover:bg-green-700 rounded-2xl font-black">SALVAR GANHADORES</button>
</div>
</div>

<div class="bg-slate-900 rounded-3xl p-8 border border-slate-800">
<div class="flex justify-between items-center mb-8">
<h2 class="text-3xl font-black">HISTÓRICO</h2>
<input id="mesFiltro" type="month" class="bg-slate-800 border-2 border-blue-500 rounded-2xl p-3 outline-none">
</div>
<table class="w-full"><thead><tr class="text-slate-400 uppercase text-sm border-b border-slate-800"><th class="py-4 text-left">Consultor</th><th>Marca</th><th>Competência</th><th>Rev</th><th>Serv</th><th>Emb</th><th>Ind.</th><th>Ações</th></tr></thead><tbody id="listaConsultores"></tbody></table>
</div>
</div>

<script type="module">
import { db } from './firebase-config.js';
import { collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, query, where, getDocs, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const campos = { name: document.getElementById('name'), store: document.getElementById('store'), competencia: document.getElementById('competencia'), marca: document.getElementById('marca'), rev_und: document.getElementById('rev_und'), serv_adic: document.getElementById('serv_adic'), emb_oficina: document.getElementById('emb_oficina'), indicador: document.getElementById('indicador'), pesquisas: document.getElementById('pesquisas'), meta_pesquisas: document.getElementById('meta_pesquisas') };
let editandoId = null;

async function salvar() {
const dados = { name: campos.name.value, store: campos.store.value, competencia: campos.competencia.value, marca: campos.marca.value, rev_und: Number(campos.rev_und.value), serv_adic: Number(campos.serv_adic.value), emb_oficina: Number(campos.emb_oficina.value), indicador: Number(campos.indicador.value), pesquisas: Number(campos.pesquisas.value), meta_pesquisas: Number(campos.meta_pesquisas.value), ferias: false };
if (editandoId) { await updateDoc(doc(db, "consultores", editandoId), dados); editandoId = null; } 
else { await addDoc(collection(db, "consultores"), dados); }
Object.values(campos).forEach(c => c.value = '');
}

document.getElementById('salvarBtn').addEventListener('click', salvar);

onSnapshot(collection(db, "consultores"), (snap) => {
const tbody = document.getElementById('listaConsultores');
tbody.innerHTML = '';
snap.forEach(d => {
const c = d.data();
const marca = c.marca || 'Hyundai';
tbody.innerHTML += `<tr class="border-b border-slate-800"><td>${c.name}</td><td>${marca}</td><td>${c.competencia}</td><td>${c.rev_und}</td><td>${c.serv_adic}</td><td>${c.emb_oficina}</td><td>${c.indicador}</td><td><button onclick="window.editar('${d.id}')">Editar</button></td></tr>`;
});
});

window.editar = (id) => { /* Lógica de preenchimento */ };

document.getElementById('salvarGanhador').addEventListener('click', async () => {
const id = `${document.getElementById('g_comp').value}_${document.getElementById('g_semana').value}`;
await setDoc(doc(db, "ganhadores_semanais", id), { nomes: document.getElementById('g_nomes').value });
});
</script>
</body>
</html>
