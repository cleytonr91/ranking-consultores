<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Gerencial</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-slate-950 text-white p-6">

<div class="max-w-7xl mx-auto">

<div class="flex flex-col xl:flex-row justify-between items-center gap-6 mb-8">

<div>

<h1 class="text-5xl font-black italic">
DASHBOARD <span class="text-blue-500">GERENCIAL</span>
</h1>

<p class="text-slate-500 uppercase tracking-widest mt-2">
GP Performance
</p>

</div>

<select id="filtroCompetencia"
class="bg-slate-900 rounded-xl p-4">

</select>

</div>

<!-- KPI -->

<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-5 mb-8">

<div class="bg-slate-900 rounded-2xl p-6">

<div class="text-slate-500 uppercase text-sm">
Faturamento Total
</div>

<div id="fat-total"
class="text-4xl font-black text-green-400 mt-2">

R$ 0

</div>

</div>

<div class="bg-slate-900 rounded-2xl p-6">

<div class="text-slate-500 uppercase text-sm">
Total Revisões
</div>

<div id="rev-total"
class="text-4xl font-black text-blue-400 mt-2">

0

</div>

</div>

<div class="bg-slate-900 rounded-2xl p-6">

<div class="text-slate-500 uppercase text-sm">
TKM Médio
</div>

<div id="tkm-medio"
class="text-4xl font-black text-yellow-400 mt-2">

R$ 0

</div>

</div>

<div class="bg-slate-900 rounded-2xl p-6">

<div class="text-slate-500 uppercase text-sm">
HGSI Médio
</div>

<div id="hgsi-medio"
class="text-4xl font-black text-purple-400 mt-2">

0

</div>

</div>

</div>

<!-- GRAFICOS -->

<div class="grid grid-cols-1 xl:grid-cols-2 gap-6 mb-8">

<div class="bg-slate-900 rounded-2xl p-6">

<h2 class="text-2xl font-black mb-4">
TKM POR CONSULTOR
</h2>

<canvas id="tkmChart"></canvas>

</div>

<div class="bg-slate-900 rounded-2xl p-6">

<h2 class="text-2xl font-black mb-4">
HGSI POR CONSULTOR
</h2>

<canvas id="hgsiChart"></canvas>

</div>

</div>

<!-- LOJAS -->

<div class="grid grid-cols-1 xl:grid-cols-2 gap-6 mb-8">

<div class="bg-slate-900 rounded-2xl p-6">

<h2 class="text-2xl font-black mb-6">
SERVIÇOS POR LOJA
</h2>

<canvas id="lojasChart"></canvas>

</div>

<div class="bg-slate-900 rounded-2xl p-6">

<h2 class="text-2xl font-black mb-6">
PARTICIPAÇÃO LOJAS
</h2>

<canvas id="participacaoChart"></canvas>

</div>

</div>

<!-- PERFORMANCE -->

<div class="bg-slate-900 rounded-2xl p-6 mb-8">

<h2 class="text-3xl font-black mb-6">
PERFORMANCE POR LOJA
</h2>

<div id="lojas-performance"
class="grid grid-cols-1 xl:grid-cols-2 gap-6">

</div>

</div>

</div>

<script type="module">

import { db } from './firebase-config.js';

import {
collection,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const filtro =
document.getElementById('filtroCompetencia');

let todosDados = [];

const fatTotal =
document.getElementById('fat-total');

const revTotal =
document.getElementById('rev-total');

const tkmMedio =
document.getElementById('tkm-medio');

const hgsiMedio =
document.getElementById('hgsi-medio');

const lojasPerformance =
document.getElementById('lojas-performance');

const tkmChart = new Chart(
document.getElementById('tkmChart'),
{
type:'bar',
data:{
labels:[],
datasets:[{
label:'TKM',
data:[],
backgroundColor:'#22c55e'
}]
}
}
);

const hgsiChart = new Chart(
document.getElementById('hgsiChart'),
{
type:'bar',
data:{
labels:[],
datasets:[{
label:'HGSI',
data:[],
backgroundColor:'#eab308'
}]
}
}
);

const lojasChart = new Chart(
document.getElementById('lojasChart'),
{
type:'bar',
data:{
labels:[],
datasets:[
{
label:'Serviços',
data:[],
backgroundColor:'#3b82f6'
},
{
label:'Embelezamento',
data:[],
backgroundColor:'#8b5cf6'
}
]
}
}
);

const participacaoChart = new Chart(
document.getElementById('participacaoChart'),
{
type:'doughnut',
data:{
labels:[],
datasets:[{
data:[],
backgroundColor:[
'#3b82f6',
'#22c55e',
'#eab308',
'#ef4444',
'#8b5cf6',
'#06b6d4'
]
}]
}
}
);

onSnapshot(collection(db,"consultores"),(snapshot)=>{

todosDados = [];

snapshot.forEach((doc)=>{

todosDados.push(doc.data());

});

const competencias =
[...new Set(
todosDados.map(c=>c.competencia)
)];

filtro.innerHTML = '';

competencias.sort().reverse();

competencias.forEach((comp)=>{

filtro.innerHTML += `
<option value="${comp}">
${comp}
</option>
`;

});

render();

});

filtro.addEventListener('change',render);

function render(){

const competencia =
filtro.value;

const data =
todosDados.filter(
c=>c.competencia === competencia
);

let faturamento = 0;
let revisoes = 0;
let hgsiTotal = 0;
let tkmTotal = 0;

let labels = [];
let tkmData = [];
let hgsiData = [];

const lojas = {};

data.forEach((c)=>{

const total =
c.serv_adic + c.emb_oficina;

const tkm =
c.rev_und > 0
? total / c.rev_und
: 0;

faturamento += total;
revisoes += c.rev_und;
hgsiTotal += c.hgsi;
tkmTotal += tkm;

labels.push(c.name);
tkmData.push(tkm.toFixed(0));
hgsiData.push(c.hgsi);

if(!lojas[c.store]){

lojas[c.store] = {
servicos:0,
embelezamento:0,
revisoes:0,
hgsi:0,
consultores:0
};

}

lojas[c.store].servicos += c.serv_adic;
lojas[c.store].embelezamento += c.emb_oficina;
lojas[c.store].revisoes += c.rev_und;
lojas[c.store].hgsi += c.hgsi;
lojas[c.store].consultores++;

});

const mediaTkm =
data.length > 0
? tkmTotal / data.length
: 0;

const mediaHgsi =
data.length > 0
? hgsiTotal / data.length
: 0;

fatTotal.innerText =
`R$ ${faturamento.toLocaleString('pt-BR')}`;

revTotal.innerText =
revisoes;

tkmMedio.innerText =
`R$ ${mediaTkm.toFixed(0)}`;

hgsiMedio.innerText =
mediaHgsi.toFixed(0);

tkmChart.data.labels = labels;
tkmChart.data.datasets[0].data = tkmData;
tkmChart.update();

hgsiChart.data.labels = labels;
hgsiChart.data.datasets[0].data = hgsiData;
hgsiChart.update();

const lojasLabels = [];
const servicosData = [];
const embData = [];
const participacao = [];

lojasPerformance.innerHTML = '';

Object.entries(lojas).forEach(([loja,dados])=>{

const totalLoja =
dados.servicos + dados.embelezamento;

const tkmServicos =
dados.revisoes > 0
? dados.servicos / dados.revisoes
: 0;

const tkmEmb =
dados.revisoes > 0
? dados.embelezamento / dados.revisoes
: 0;

const tkmGeral =
dados.revisoes > 0
? totalLoja / dados.revisoes
: 0;

const hgsi =
dados.consultores > 0
? dados.hgsi / dados.consultores
: 0;

lojasLabels.push(loja);
servicosData.push(dados.servicos);
embData.push(dados.embelezamento);
participacao.push(totalLoja);

lojasPerformance.innerHTML += `

<div class="bg-slate-950 rounded-2xl p-6">

<div class="flex justify-between items-center mb-6">

<div>

<div class="text-3xl font-black uppercase">
${loja}
</div>

<div class="text-slate-500 uppercase tracking-widest mt-1">
Performance Geral
</div>

</div>

<div>

<div class="text-slate-500 text-sm">
TKM Geral
</div>

<div class="text-4xl font-black text-green-400">
R$ ${tkmGeral.toFixed(0)}
</div>

</div>

</div>

<div class="grid grid-cols-2 md:grid-cols-3 gap-4">

<div class="bg-slate-900 rounded-xl p-4">

<div class="text-slate-500 text-xs uppercase">
Serviços
</div>

<div class="text-3xl font-black text-blue-400 mt-2">
R$ ${dados.servicos.toFixed(0)}
</div>

</div>

<div class="bg-slate-900 rounded-xl p-4">

<div class="text-slate-500 text-xs uppercase">
Embelezamento
</div>

<div class="text-3xl font-black text-purple-400 mt-2">
R$ ${dados.embelezamento.toFixed(0)}
</div>

</div>

<div class="bg-slate-900 rounded-xl p-4">

<div class="text-slate-500 text-xs uppercase">
Revisões
</div>

<div class="text-3xl font-black mt-2">
${dados.revisoes}
</div>

</div>

<div class="bg-slate-900 rounded-xl p-4">

<div class="text-slate-500 text-xs uppercase">
TKM Serviços
</div>

<div class="text-3xl font-black text-cyan-400 mt-2">
R$ ${tkmServicos.toFixed(0)}
</div>

</div>

<div class="bg-slate-900 rounded-xl p-4">

<div class="text-slate-500 text-xs uppercase">
TKM Emb.
</div>

<div class="text-3xl font-black text-pink-400 mt-2">
R$ ${tkmEmb.toFixed(0)}
</div>

</div>

<div class="bg-slate-900 rounded-xl p-4">

<div class="text-slate-500 text-xs uppercase">
HGSI Médio
</div>

<div class="text-3xl font-black mt-2
${hgsi >= 970
? 'text-green-400'
: hgsi >= 960
? 'text-yellow-400'
: 'text-red-500'}
">
${hgsi.toFixed(0)}
</div>

</div>

</div>

</div>

`;

});

lojasChart.data.labels = lojasLabels;
lojasChart.data.datasets[0].data = servicosData;
lojasChart.data.datasets[1].data = embData;
lojasChart.update();

participacaoChart.data.labels = lojasLabels;
participacaoChart.data.datasets[0].data = participacao;
participacaoChart.update();

}

</script>

</body>

</html>
