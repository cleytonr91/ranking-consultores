<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RANKING CONSULTORES</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{
background: radial-gradient(circle at top left,#07133a,#020617 55%);
}
.glow-gold{box-shadow:0 0 40px rgba(255,196,0,.35);}
.glow-silver{box-shadow:0 0 35px rgba(255,255,255,.18);}
.glow-bronze{box-shadow:0 0 35px rgba(255,132,0,.18);}
</style>
</head>
<body class="text-white min-h-screen p-5 md:p-8">
<div class="max-w-[1800px] mx-auto">
<div class="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-6 mb-10">
<div>
<div class="flex items-center gap-4">
<div class="w-5 h-5 bg-green-400 rounded-full"></div>
<h1 class="text-5xl md:text-7xl font-black italic tracking-tight">
RANKING <span class="text-blue-500">CONSULTORES</span>
</h1>
</div>
</div>
<div class="flex flex-col md:flex-row gap-5">
<select id="filtroCompetencia" class="bg-[#0f172a] border border-slate-700 rounded-2xl px-6 py-5 text-2xl outline-none min-w-[320px]"></select>
<div class="bg-[#111827] border border-slate-700 rounded-3xl px-10 py-6 text-center min-w-[300px]">
<div id="clock" class="text-6xl font-black">00:00:00</div>
<div id="date" class="text-slate-400 text-2xl mt-2">00/00/0000</div>
</div>
</div>
</div>
<div id="top3" class="grid grid-cols-1 xl:grid-cols-3 gap-8 mb-10"></div>
<div id="campanhaSection" class="hidden bg-[#0b1224]/90 border border-yellow-500/30 rounded-[30px] p-5 md:p-8 mb-10 backdrop-blur">
<div class="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-3 mb-8">
<div>
<h2 class="text-3xl md:text-5xl font-black">CAMPANHA SEMANAL</h2>
<div id="campanhaCompetencia" class="text-yellow-300 uppercase tracking-[4px] mt-2 text-sm font-black"></div>
</div>
<div class="text-slate-400 uppercase tracking-widest text-sm">
VENCEDORES POR SEMANA
</div>
</div>
<div id="campanhaSemanas" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-5"></div>
</div>
<div class="bg-[#081226]/80 border border-slate-800 rounded-[30px] p-5 md:p-8 backdrop-blur">
<div class="flex justify-between items-center mb-6">
<h2 class="text-3xl md:text-5xl font-black">RANKING GERAL</h2>
<div class="flex items-center gap-3 text-slate-400 uppercase tracking-widest text-sm">
ATUALIZAÇÃO EM TEMPO REAL <div class="w-3 h-3 bg-green-400 rounded-full"></div>
</div>
</div>
<div class="overflow-x-auto">
<table class="w-full min-w-[1300px]">
<thead>
<tr class="border-b border-slate-800 text-slate-400 uppercase text-sm">
<th class="text-left py-4">Pos</th><th class="text-left">Nome</th><th class="text-left">Sobrenome</th><th class="text-left">Loja</th><th class="text-center">REV</th><th class="text-center">Serviços</th><th class="text-center">Embelez.</th><th class="text-center">Total</th><th class="text-center">TKM</th><th class="text-center">HGSI</th><th class="text-center">Pesquisas</th>
</tr>
</thead>
<tbody id="ranking-body"></tbody>
</table>
</div>
</div>
</div>
<script type="module">
import { db } from './firebase-config.js';
import { collection, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const top3 = document.getElementById('top3');
const rankingBody = document.getElementById('ranking-body');
const filtro = document.getElementById('filtroCompetencia');
const campanhaSection = document.getElementById('campanhaSection');
const campanhaCompetencia = document.getElementById('campanhaCompetencia');
const campanhaSemanas = document.getElementById('campanhaSemanas');
let todosDados = [];
let cadastrosConsultores = [];
let campanhaAtual = null;
let unsubscribeCampanha = null;
let competenciaCampanhaAtual = '';
function atualizarRelogio(){
const agora = new Date();
document.getElementById('clock').innerText = agora.toLocaleTimeString('pt-BR');
document.getElementById('date').innerText = agora.toLocaleDateString('pt-BR');
}
function escapeHtml(valor){
return String(valor || '')
.replaceAll('&','&amp;')
.replaceAll('<','&lt;')
.replaceAll('>','&gt;')
.replaceAll('"','&quot;')
.replaceAll("'","&#039;");
}
function dinheiroInteiro(valor){
return `R$ ${Math.ceil(Number(valor || 0)).toLocaleString('pt-BR')}`;
}
setInterval(atualizarRelogio, 1000);
atualizarRelogio();
onSnapshot(collection(db, "consultores"), (snapshot) => {
todosDados = [];
snapshot.forEach((doc) => { todosDados.push(doc.data()); });
const competenciaSelecionada = filtro.value;
const competencias = [...new Set(todosDados.filter(c => !c.ferias).map(c => c.competencia))].sort().reverse();
filtro.innerHTML = '';
competencias.forEach((comp) => {
filtro.innerHTML += `<option value="${comp}">Competência: ${comp.replace('-', '/')}</option>`;
});
if(competencias.includes(competenciaSelecionada)){
filtro.value = competenciaSelecionada;
}
render();
});
onSnapshot(collection(db, "consultores_cadastro"), (snapshot) => {
cadastrosConsultores = [];
snapshot.forEach((doc) => {
cadastrosConsultores.push({
id:doc.id,
...doc.data()
});
});
render();
});
filtro.addEventListener('change', render);
function cadastroDoResultado(resultado){
const codigo = String(resultado.codigo_apolo || resultado.codigo || '');
if(codigo){
const porCodigo =
cadastrosConsultores.find(c=>String(c.codigo || c.id) === codigo);
if(porCodigo) return porCodigo;
}
const cpf = String(resultado.cpf_hgsi || resultado.cpf || '').replace(/\D/g,'');
if(cpf){
const porCpf =
cadastrosConsultores.find(c=>String(c.cpf || '').replace(/\D/g,'') === cpf);
if(porCpf) return porCpf;
}
return cadastrosConsultores.find(c=>
String(c.name || '').toUpperCase() === String(resultado.name || '').toUpperCase() &&
String(c.store || '').toUpperCase() === String(resultado.store || '').toUpperCase()
);
}
function metaPesquisaOficial(resultado){
const cadastro = cadastroDoResultado(resultado);
const metaCadastro = Number(cadastro?.meta_pesquisas || 0);
return metaCadastro > 0 ? metaCadastro : Number(resultado.meta_pesquisas || 0);
}
function render(){
const competencia = filtro.value;
if (!competencia) {
renderCampanha();
return;
}
acompanharCampanha(competencia);
const data = todosDados.filter(c => c.competencia === competencia && !c.ferias);
data.sort((a, b) => {
const tkmA = a.rev_und > 0 ? (a.serv_adic + a.emb_oficina) / a.rev_und : 0;
const tkmB = b.rev_und > 0 ? (b.serv_adic + b.emb_oficina) / b.rev_und : 0;
return tkmB - tkmA;
});
top3.innerHTML = '';
rankingBody.innerHTML = '';
data.forEach((original, i) => {
const c = {
...original,
serv_adic:Math.ceil(Number(original.serv_adic || 0)),
emb_oficina:Math.ceil(Number(original.emb_oficina || 0))
};
const nomeCompleto = (c.name || '').trim().split(' ');
const nome = nomeCompleto[0] || '';
const sobrenome = nomeCompleto.slice(1).join(' ') || '';
const total = Math.ceil((Number(original.serv_adic || 0)) + (Number(original.emb_oficina || 0)));
const tkm = c.rev_und > 0 ? Math.ceil(total / c.rev_und) : 0;
const metaPesquisas = metaPesquisaOficial(c);
const pesquisasPercent = metaPesquisas > 0 ? ((c.pesquisas || 0) / metaPesquisas) * 100 : 0;
const metaColor = pesquisasPercent >= 100 ? 'text-green-400' : pesquisasPercent >= 90 ? 'text-yellow-400' : 'text-red-500';
const hgsiColor = (c.hgsi || 0) >= 970 ? 'text-green-400' : (c.hgsi || 0) >= 960 ? 'text-yellow-400' : 'text-red-500';
if(i < 3){
const medalha = i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉';
const bg = i === 0 ? 'bg-gradient-to-br from-yellow-900/90 to-yellow-700/40 border-yellow-400 glow-gold' : i === 1 ? 'bg-gradient-to-br from-slate-400/40 to-slate-600/30 border-slate-300 glow-silver' : 'bg-gradient-to-br from-orange-900/80 to-orange-700/30 border-orange-400 glow-bronze';
top3.innerHTML += `<div class="${bg} border rounded-[35px] p-8 flex flex-col justify-between min-h-[600px]"><div><div class="flex justify-between items-start"><div><div class="text-7xl">${medalha}</div><div class="text-4xl mt-3 uppercase tracking-wide">${i+1}º LUGAR</div></div><div class="text-right"><div class="text-slate-300 uppercase text-3xl">TKM</div><div class="text-7xl font-black mt-2">R$ ${tkm.toFixed(0)}</div></div></div><div class="mt-12"><div class="text-6xl font-black uppercase leading-[1.0] break-words">${nome}</div><div class="text-6xl font-black uppercase leading-[1.0] break-words">${sobrenome}</div><div class="text-3xl uppercase text-slate-200 mt-5 break-words">${c.store || ''}</div></div></div><div class="grid grid-cols-3 gap-4 mt-10"><div class="bg-white/5 border border-white/10 rounded-3xl p-5 text-center"><div class="text-slate-400 uppercase text-xl">REV</div><div class="text-5xl font-black mt-3">${c.rev_und || 0}</div></div><div class="bg-white/5 border border-white/10 rounded-3xl p-5 text-center"><div class="text-slate-400 uppercase text-xl">HGSI</div><div class="text-5xl font-black mt-3 ${hgsiColor}">${c.hgsi || 0}</div></div><div class="bg-white/5 border border-white/10 rounded-3xl p-5 text-center"><div class="text-slate-400 uppercase text-xl">META</div><div class="text-5xl font-black mt-3 ${metaColor}">${pesquisasPercent.toFixed(0)}%</div></div></div></div>`;
}
rankingBody.innerHTML += `<tr class="border-b border-slate-800 hover:bg-slate-800/20 transition-all"><td class="py-5 text-3xl font-black">${i+1}º</td><td class="text-2xl font-black uppercase">${nome}</td><td class="text-2xl font-black uppercase">${sobrenome}</td><td class="text-slate-400 uppercase text-xl">${c.store || ''}</td><td class="text-center text-2xl">${c.rev_und || 0}</td><td class="text-center text-cyan-400 font-black text-2xl">R$ ${(c.serv_adic || 0).toLocaleString('pt-BR')}</td><td class="text-center text-pink-400 font-black text-2xl">R$ ${(c.emb_oficina || 0).toLocaleString('pt-BR')}</td><td class="text-center text-blue-400 font-black text-2xl">R$ ${total.toLocaleString('pt-BR')}</td><td class="text-center text-green-400 font-black text-2xl">R$ ${tkm.toFixed(0)}</td><td class="text-center font-black text-2xl ${hgsiColor}">${c.hgsi || 0}</td><td class="text-center font-black text-2xl ${metaColor}">${pesquisasPercent.toFixed(0)}%</td></tr>`;
});
}
function acompanharCampanha(competencia){
if(competenciaCampanhaAtual === competencia) return;
competenciaCampanhaAtual = competencia;
campanhaAtual = null;
renderCampanha();
if(unsubscribeCampanha){
unsubscribeCampanha();
}
unsubscribeCampanha = onSnapshot(doc(db,"campanhas",competencia),(snapshot)=>{
campanhaAtual = snapshot.exists() ? snapshot.data() : null;
renderCampanha();
});
}
function renderCampanha(){
const competencia = filtro.value;
if(!competencia){
campanhaSection.classList.add('hidden');
campanhaSemanas.innerHTML = '';
return;
}
const semanas = [
{titulo:'SEMANA 1',periodo:'01 a 06',dados:campanhaAtual?.semana1},
{titulo:'SEMANA 2',periodo:'08 a 13',dados:campanhaAtual?.semana2},
{titulo:'SEMANA 3',periodo:'15 a 20',dados:campanhaAtual?.semana3},
{titulo:'SEMANA 4',periodo:'22 a 30',dados:campanhaAtual?.semana4}
];
campanhaCompetencia.innerText = `COMPETENCIA: ${competencia.replace('-', '/')}`;
campanhaSemanas.innerHTML = semanas.map(({titulo,periodo,dados})=>{
const normalizarVencedor = (valor)=>{
if(typeof valor === 'string'){
return {nome:valor,loja:''};
}
return {
nome:valor?.nome || '',
loja:valor?.loja || ''
};
};
const vencedores = [
{posicao:'1',rotulo:'Primeiro',...normalizarVencedor(dados?.primeiro),className:'border-yellow-400/60 bg-yellow-500/10 text-yellow-200'},
{posicao:'2',rotulo:'Segundo',...normalizarVencedor(dados?.segundo),className:'border-slate-300/50 bg-white/10 text-slate-100'},
{posicao:'3',rotulo:'Terceiro',...normalizarVencedor(dados?.terceiro),className:'border-orange-400/50 bg-orange-500/10 text-orange-200'}
];
return `
<div class="bg-[#050b18] border border-slate-800 rounded-[24px] p-5">
<div class="mb-5">
<div class="text-2xl font-black">${titulo}</div>
<div class="text-slate-500 uppercase tracking-widest text-xs mt-1">${periodo}</div>
</div>
<div class="space-y-3">
${vencedores.map(v=>`
<div class="${v.className} border rounded-2xl p-4 min-h-[92px]">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center font-black text-xl">${v.posicao}</div>
<div>
<div class="text-slate-400 uppercase text-xs tracking-widest">${v.rotulo}</div>
<div class="text-2xl font-black uppercase leading-tight break-words">${escapeHtml(v.nome || 'A definir')}</div>
${v.loja ? `<div class="text-sm uppercase tracking-widest text-slate-400 mt-1 break-words">${escapeHtml(v.loja)}</div>` : ''}
</div>
</div>
</div>
`).join('')}
</div>
</div>
`;
}).join('');
campanhaSection.classList.remove('hidden');
}
</script>
</body>
</html>
