<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>RANKING PREMIUM | CONSULTORIA</title><script src="https://cdn.tailwindcss.com"></script><style>body{background:linear-gradient(135deg,#0f172a 0%,#020617 100%);font-family:'Inter',sans-serif}.glass{background:rgba(15,23,42,0.6);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1)}.glow-gold{box-shadow:0 0 30px rgba(234,179,8,0.2)}.glow-silver{box-shadow:0 0 30px rgba(148,163,184,0.2)}.glow-bronze{box-shadow:0 0 30px rgba(194,65,12,0.2)}</style></head><body class="text-slate-100 min-h-screen p-4 md:p-8"><div class="max-w-[1600px] mx-auto"><header class="flex flex-col lg:flex-row justify-between items-center gap-8 mb-12 p-6 glass rounded-3xl"><div class="flex items-center gap-6"><div class="w-3 h-16 bg-blue-500 rounded-full"></div><div><h1 class="text-4xl md:text-6xl font-extrabold tracking-tighter uppercase">Ranking <span class="text-blue-400">Consultores</span></h1><p class="text-slate-400">Dashboard de Performance em Tempo Real</p></div></div><div class="flex flex-wrap gap-4"><select id="filtroCompetencia" class="bg-slate-900 border border-slate-700 rounded-xl px-6 py-4 text-lg outline-none focus:border-blue-500 transition-all"></select><div class="bg-slate-900 border border-slate-700 rounded-xl px-8 py-3 text-center"><div id="clock" class="text-3xl font-mono font-bold">00:00:00</div><div id="date" class="text-slate-500 text-sm">00/00/0000</div></div></div></header><div id="top3" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12"></div><section class="glass rounded-3xl p-6 md:p-10"><div class="flex justify-between items-center mb-8"><h2 class="text-3xl font-bold">Ranking Geral</h2><div class="flex items-center gap-2 text-xs font-bold text-green-400 bg-green-400/10 px-4 py-2 rounded-full">● LIVE UPDATING</div></div><div class="overflow-x-auto"><table class="w-full text-left border-collapse"><thead class="text-slate-500 uppercase text-xs tracking-wider"><tr class="border-b border-slate-800"><th class="p-4">Pos</th><th class="p-4">Consultor</th><th class="p-4">Loja</th><th class="p-4 text-center">REV</th><th class="p-4 text-center">Serviços</th><th class="p-4 text-center">Embelez.</th><th class="p-4 text-center">Total</th><th class="p-4 text-center">TKM</th><th class="p-4 text-center">HGSI</th><th class="p-4 text-center">Meta</th></tr></thead><tbody id="ranking-body"></tbody></table></div></section></div><script type="module">import { db } from './firebase-config.js';import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";const top3 = document.getElementById('top3');const rankingBody = document.getElementById('ranking-body');const filtro = document.getElementById('filtroCompetencia');let todosDados = [];function atualizarRelogio(){const agora = new Date();document.getElementById('clock').innerText = agora.toLocaleTimeString('pt-BR');document.getElementById('date').innerText = agora.toLocaleDateString('pt-BR');}setInterval(atualizarRelogio,1000);atualizarRelogio();onSnapshot(collection(db,"consultores"),(snapshot)=>{todosDados = [];snapshot.forEach((doc)=>todosDados.push(doc.data()));const comps = [...new Set(todosDados.map(c=>c.competencia))].sort().reverse();filtro.innerHTML = comps.map(c=>`<option value="${c}">Competência: ${c.replace('-','/')}</option>`).join('');render();});filtro.addEventListener('change',render);function render(){const data = todosDados.filter(c=>c.competencia === filtro.value).sort((a,b)=>{const tkmA = a.rev_und > 0 ? (a.serv_adic + a.emb_oficina) / a.rev_und : 0;const tkmB = b.rev_und > 0 ? (b.serv_adic + b.emb_oficina) / b.rev_und : 0;return tkmB - tkmA;});top3.innerHTML = '';rankingBody.innerHTML = '';data.forEach((c,i)=>{const total = c.serv_adic + c.emb_oficina;const tkm = c.rev_und > 0 ? total / c.rev_und : 0;const pPerc = c.meta_pesquisas > 0 ? (c.pesquisas / c.meta_pesquisas) * 100 : 0;const mColor = pPerc >= 100 ? 'text-green-400' : pPerc >= 90 ? 'text-yellow-400' : 'text-red-400';const hColor = c.hgsi >= 970 ? 'text-green-400' : c.hgsi >= 960 ? 'text-yellow-400' : 'text-red-400';if(i < 3){const medal = ['🥇','🥈','🥉'][i];const bg = ['from-yellow-900/40 to-yellow-600/10 border-yellow-500/50', 'from-slate-700/40 to-slate-600/10 border-slate-500/50', 'from-orange-900/40 to-orange-700/10 border-orange-500/50'][i];top3.innerHTML += `<div class="glass bg-gradient-to-br ${bg} border rounded-3xl p-6 flex flex-col gap-4"> <div class="text-4xl">${medal}</div><div class="text-2xl font-bold">${c.name}</div><div class="text-sm text-slate-400">${c.store}</div><div class="text-4xl font-black">R$ ${tkm.toFixed(0)} <span class="text-sm font-normal">TKM</span></div></div>`;}rankingBody.innerHTML += `<tr class="border-b border-slate-800/50 hover:bg-slate-800/30 transition-colors"><td class="p-4 font-bold">${i+1}º</td><td class="p-4 font-semibold">${c.name}</td><td class="p-4 text-slate-400">${c.store}</td><td class="p-4 text-center">${c.rev_und}</td><td class="p-4 text-center">R$ ${c.serv_adic.toLocaleString()}</td><td class="p-4 text-center">R$ ${c.emb_oficina.toLocaleString()}</td><td class="p-4 text-center font-bold">R$ ${total.toLocaleString()}</td><td class="p-4 text-center font-bold text-blue-400">R$ ${tkm.toFixed(0)}</td><td class="p-4 text-center font-bold ${hColor}">${c.hgsi}</td><td class="p-4 text-center font-bold ${mColor}">${pPerc.toFixed(0)}%</td></tr>`;});}</script></body></html>
