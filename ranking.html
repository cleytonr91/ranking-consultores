<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ranking Consultores</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{
background:
radial-gradient(circle at 22% 0%,rgba(37,99,235,.22),transparent 34%),
radial-gradient(circle at 80% 18%,rgba(14,165,233,.14),transparent 28%),
linear-gradient(135deg,#020617 0%,#07111f 52%,#020617 100%);
}
.panel{
background:linear-gradient(180deg,rgba(15,23,42,.92),rgba(8,15,29,.9));
border:1px solid rgba(148,163,184,.16);
box-shadow:0 24px 80px rgba(0,0,0,.35);
}
.podium-gold{
background:
radial-gradient(circle at 50% -18%,rgba(250,204,21,.34),transparent 42%),
linear-gradient(160deg,rgba(113,63,18,.42),rgba(7,18,37,.94) 45%,rgba(8,15,29,.96));
box-shadow:0 0 0 1px rgba(250,204,21,.72),0 0 70px rgba(250,204,21,.28),0 30px 80px rgba(0,0,0,.45);
}
.podium-silver{
background:
radial-gradient(circle at 50% -18%,rgba(226,232,240,.2),transparent 42%),
linear-gradient(160deg,rgba(71,85,105,.26),rgba(7,18,37,.94) 48%,rgba(8,15,29,.96));
box-shadow:0 0 0 1px rgba(226,232,240,.48),0 0 44px rgba(148,163,184,.22),0 24px 70px rgba(0,0,0,.38);
}
.podium-bronze{
background:
radial-gradient(circle at 50% -18%,rgba(251,146,60,.2),transparent 42%),
linear-gradient(160deg,rgba(124,45,18,.25),rgba(7,18,37,.94) 48%,rgba(8,15,29,.96));
box-shadow:0 0 0 1px rgba(251,146,60,.52),0 0 44px rgba(251,146,60,.18),0 24px 70px rgba(0,0,0,.38);
}
.podium-card{
position:relative;
overflow:hidden;
transition:transform .25s ease,box-shadow .25s ease;
}
.podium-card::before{
content:"";
position:absolute;
inset:-1px;
background:linear-gradient(115deg,transparent 0%,rgba(255,255,255,.1) 22%,transparent 42%);
opacity:.72;
pointer-events:none;
}
.podium-card::after{
content:"";
position:absolute;
left:18px;
right:18px;
top:0;
height:1px;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);
pointer-events:none;
}
.podium-content{
position:relative;
z-index:1;
}
.podium-rank{
align-items:center;
border-radius:999px;
display:inline-flex;
height:42px;
justify-content:center;
width:42px;
}
.podium-champion{
animation:pulseGlow 2.8s ease-in-out infinite;
}
.podium-stage{
background:
radial-gradient(circle at 50% 0%,rgba(250,204,21,.18),transparent 34%),
radial-gradient(circle at 18% 18%,rgba(59,130,246,.16),transparent 28%),
radial-gradient(circle at 84% 24%,rgba(251,146,60,.12),transparent 30%),
linear-gradient(180deg,rgba(15,23,42,.5),rgba(2,6,23,.1));
border:1px solid rgba(148,163,184,.12);
box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 30px 90px rgba(0,0,0,.24);
}
.champion-card{
transform:translateY(-10px);
}
.champion-card .podium-name{
text-shadow:0 0 28px rgba(250,204,21,.26),0 5px 18px rgba(0,0,0,.5);
}
.podium-medal{
box-shadow:inset 0 1px 0 rgba(255,255,255,.2),0 12px 30px rgba(0,0,0,.24);
}
.podium-highlight{
background:linear-gradient(90deg,rgba(250,204,21,.08),rgba(250,204,21,.22),rgba(250,204,21,.08));
border:1px solid rgba(250,204,21,.28);
}
@keyframes pulseGlow{
0%,100%{filter:drop-shadow(0 0 0 rgba(250,204,21,0));}
50%{filter:drop-shadow(0 0 14px rgba(250,204,21,.5));}
}
</style>
</head>
<body class="text-white min-h-screen p-5 md:p-8">
<div class="max-w-[1880px] mx-auto">

<header class="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-8 mb-8">
<div>
<h1 class="text-5xl md:text-7xl xl:text-8xl font-black italic tracking-tight leading-none">
RANKING <span class="text-blue-500">CONSULTORES</span>
</h1>
<img src="logo-linhares.png" alt="Linhares" class="mt-5 h-14 md:h-20 w-auto object-contain">
</div>
<div class="flex flex-col md:flex-row gap-4 w-full xl:w-auto">
<select id="filtroCompetencia" class="bg-[#0f172a] border border-slate-700 rounded-2xl px-6 py-5 text-xl md:text-2xl outline-none min-w-[280px]"></select>
<div class="panel rounded-3xl px-8 py-5 text-center min-w-[260px]">
<div id="clock" class="text-5xl md:text-6xl font-black leading-none">00:00:00</div>
<div id="date" class="text-slate-400 text-xl mt-2">00/00/0000</div>
</div>
</div>
</header>

<main class="grid grid-cols-1 gap-7 mb-8">
<section class="panel rounded-[30px] p-5 md:p-7">
<div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-5">
<div>
<h2 class="text-3xl md:text-5xl font-black">PÓDIO DO MÊS</h2>
<div id="podioCompetencia" class="text-blue-300 uppercase tracking-[4px] mt-2 text-sm font-black"></div>
</div>
</div>
<div id="top3" class="podium-stage grid grid-cols-1 xl:grid-cols-3 gap-7 items-end rounded-[28px] p-5 md:p-6"></div>
<div class="mt-7 pt-6 border-t border-slate-800">
<div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-5">
<h2 class="text-3xl md:text-4xl font-black">RANKING GERAL</h2>
<div id="rankingResumo" class="text-slate-400 uppercase tracking-widest text-sm"></div>
</div>
<div class="overflow-x-auto">
<table class="w-full min-w-[1320px]">
<thead>
<tr class="border-b border-slate-800 text-slate-400 uppercase text-sm">
<th class="text-left py-4">Pos</th>
<th class="text-left">Consultor</th>
<th class="text-left">Loja</th>
<th class="text-center">HGSI / NPS</th>
<th class="text-center">Semana 01</th>
<th class="text-center border-l border-slate-800">Semana 02</th>
<th class="text-center border-l border-slate-800">Semana 03</th>
<th class="text-center border-l border-slate-800">Semana 04</th>
<th class="text-center border-l border-slate-800">Total do Mês</th>
</tr>
</thead>
<tbody id="ranking-body"></tbody>
</table>
</div>
</div>
</section>

<aside id="campanhaSection" class="panel rounded-[30px] p-5 md:p-7">
<div class="mb-6">
<h2 class="text-3xl md:text-4xl font-black">CAMPANHA SEMANAL</h2>
<div id="campanhaCompetencia" class="text-yellow-300 uppercase tracking-[4px] mt-2 text-xs font-black"></div>
</div>
<div id="campanhaSemanas" class="grid grid-cols-1 md:grid-cols-2 2xl:grid-cols-4 gap-4"></div>
</aside>
</main>


</div>

<script type="module">
import { db } from './firebase-config.js';
import { collection, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const top3 = document.getElementById('top3');
const rankingBody = document.getElementById('ranking-body');
const filtro = document.getElementById('filtroCompetencia');
const campanhaSection = document.getElementById('campanhaSection');
const campanhaCompetencia = document.getElementById('campanhaCompetencia');
const campanhaSemanas = document.getElementById('campanhaSemanas');
const podioCompetencia = document.getElementById('podioCompetencia');
const rankingResumo = document.getElementById('rankingResumo');

let todosDados = [];
let cadastrosConsultores = [];
let campanhaAtual = null;
let unsubscribeCampanha = null;
let competenciaCampanhaAtual = '';

function atualizarRelogio(){
const agora = new Date();
document.getElementById('clock').innerText = agora.toLocaleTimeString('pt-BR');
document.getElementById('date').innerText = agora.toLocaleDateString('pt-BR');
}

function escapeHtml(valor){
return String(valor || '')
.replaceAll('&','&amp;')
.replaceAll('<','&lt;')
.replaceAll('>','&gt;')
.replaceAll('"','&quot;')
.replaceAll("'","&#039;");
}

function dinheiroInteiro(valor){
return `R$ ${Math.ceil(Number(valor || 0)).toLocaleString('pt-BR')}`;
}

function numero(valor){
return Number(valor || 0) || 0;
}

function iniciais(nome){
const partes = String(nome || '').trim().split(/\s+/).filter(Boolean);
return partes.slice(0,2).map(p=>p[0]).join('').toUpperCase() || '?';
}

function cadastroDoResultado(resultado){
const codigo = String(resultado.codigo_apolo || resultado.codigo || '');
if(codigo){
const porCodigo =
cadastrosConsultores.find(c=>String(c.codigo || c.id) === codigo);
if(porCodigo) return porCodigo;
}
const cpf = String(resultado.cpf_hgsi || resultado.cpf || '').replace(/\D/g,'');
if(cpf){
const porCpf =
cadastrosConsultores.find(c=>String(c.cpf || '').replace(/\D/g,'') === cpf);
if(porCpf) return porCpf;
}
return cadastrosConsultores.find(c=>
String(c.name || '').toUpperCase() === String(resultado.name || '').toUpperCase() &&
String(c.store || '').toUpperCase() === String(resultado.store || '').toUpperCase()
);
}

function metaPesquisaOficial(resultado){
const cadastro = cadastroDoResultado(resultado);
const metaCadastro = Number(cadastro?.meta_pesquisas || 0);
return metaCadastro > 0 ? metaCadastro : Number(resultado.meta_pesquisas || 0);
}

function enriquecerResultado(original){
const servicos = Math.ceil(numero(original.serv_adic));
const embelezamento = Math.ceil(numero(original.emb_oficina));
const total = Math.ceil(numero(original.serv_adic) + numero(original.emb_oficina));
const revisoes = numero(original.rev_und);
const tkm = revisoes > 0 ? Math.ceil(total / revisoes) : 0;
const metaPesquisas = metaPesquisaOficial(original);
const pesquisasPercent = metaPesquisas > 0
? (numero(original.pesquisas) / metaPesquisas) * 100
: 0;
return {
...original,
servicos,
embelezamento,
total,
revisoes,
tkm,
pesquisasPercent,
metaPesquisas
};
}

function semanaDoResultado(resultado){
const semana = Number(resultado.semana || 1);
return semana >= 1 && semana <= 4 ? semana : 1;
}

function chaveRanking(valor){
return String(valor || '').trim().replace(/\s+/g,' ').toUpperCase();
}

function semanaVazia(){
return {
servicos:0,
embelezamento:0,
total:0,
revisoes:0,
tkm:0
};
}

function agregarResultadosPorConsultor(resultados){
const mapa = new Map();
resultados.forEach((resultado)=>{
const c = enriquecerResultado(resultado);
const chave = `${chaveRanking(c.name)}|${chaveRanking(c.store)}`;
if(!mapa.has(chave)){
mapa.set(chave,{
...c,
servicos:0,
embelezamento:0,
total:0,
revisoes:0,
tkm:0,
hgsi:0,
pesquisas:0,
metaPesquisas:0,
pesquisasPercent:0,
hgsiValores:[],
semanas:{
1:semanaVazia(),
2:semanaVazia(),
3:semanaVazia(),
4:semanaVazia()
}
});
}
const agregado = mapa.get(chave);
const semana = agregado.semanas[semanaDoResultado(c)];
semana.servicos += c.servicos;
semana.embelezamento += c.embelezamento;
semana.total += c.total;
semana.revisoes += c.revisoes;
semana.tkm = semana.revisoes > 0 ? Math.ceil(semana.total / semana.revisoes) : 0;
agregado.servicos += c.servicos;
agregado.embelezamento += c.embelezamento;
agregado.total += c.total;
agregado.revisoes += c.revisoes;
agregado.pesquisas += numero(c.pesquisas);
agregado.metaPesquisas += numero(c.metaPesquisas);
if(numero(c.hgsi) > 0){
agregado.hgsiValores.push(numero(c.hgsi));
}
});
return [...mapa.values()].map((c)=>{
c.tkm = c.revisoes > 0 ? Math.ceil(c.total / c.revisoes) : 0;
c.hgsi = c.hgsiValores.length
? c.hgsiValores.reduce((acc,valor)=>acc + valor,0) / c.hgsiValores.length
: 0;
c.pesquisasPercent = c.metaPesquisas > 0
? (c.pesquisas / c.metaPesquisas) * 100
: 0;
return c;
});
}

function renderSemana(semana){
if(!semana || (!semana.total && !semana.revisoes)){
return '<span class="text-slate-600">-</span>';
}
return `
<div class="text-left min-w-[150px]">
<div class="text-center text-blue-300 font-black text-xl mb-2">${dinheiroInteiro(semana.total)}</div>
<div class="grid grid-cols-[48px_1fr] gap-x-2 text-sm leading-6">
<span class="text-slate-500 font-black">Serv.</span><span class="text-cyan-300 font-black text-right">${dinheiroInteiro(semana.servicos)}</span>
<span class="text-slate-500 font-black">Emb.</span><span class="text-pink-300 font-black text-right">${dinheiroInteiro(semana.embelezamento)}</span>
<span class="text-slate-500 font-black">TKM</span><span class="text-green-300 font-black text-right">${dinheiroInteiro(semana.tkm)}</span>
<span class="text-slate-500 font-black">REV</span><span class="text-slate-200 font-black text-right">${semana.revisoes || 0}</span>
</div>
</div>
`;
}

function classeHgsi(valor){
return valor >= 970
? 'text-green-400'
: valor >= 960
? 'text-yellow-400'
: 'text-red-400';
}

function classeMeta(valor){
return valor >= 100
? 'text-green-400'
: valor >= 90
? 'text-yellow-400'
: 'text-red-400';
}

function renderCardPodio(c, posicao){
const nomeCompleto = String(c.name || '').trim();
const primeiroNome = nomeCompleto.split(/\s+/)[0] || '';
const nomeRestante = nomeCompleto.split(/\s+/).slice(1).join(' ');
const estilo = {
1:{
ordem:'xl:order-2',
altura:'min-h-[370px]',
card:'podium-gold border-yellow-400/50',
numero:'bg-yellow-400 text-slate-950',
titulo:'text-yellow-200',
avatar:'from-yellow-300 to-yellow-600',
badge:'CAMPEÃO',
medalha:'OURO',
label:'1º LUGAR'
},
2:{
ordem:'xl:order-1',
altura:'min-h-[320px]',
card:'podium-silver border-slate-300/40',
numero:'bg-slate-200 text-slate-950',
titulo:'text-slate-100',
avatar:'from-slate-200 to-slate-500',
badge:'DESTAQUE',
medalha:'PRATA',
label:'2º LUGAR'
},
3:{
ordem:'xl:order-3',
altura:'min-h-[320px]',
card:'podium-bronze border-orange-400/40',
numero:'bg-orange-400 text-slate-950',
titulo:'text-orange-200',
avatar:'from-orange-300 to-orange-700',
badge:'TOP 3',
medalha:'BRONZE',
label:'3º LUGAR'
}
}[posicao];

return `
<article class="podium-card ${posicao === 1 ? 'champion-card' : ''} ${estilo.ordem} ${estilo.card} ${estilo.altura} rounded-[24px] border p-5 flex flex-col justify-between">
<div class="podium-content flex flex-col justify-between h-full">
<div class="flex justify-between items-start">
<div>
<div class="${estilo.titulo} text-xl font-black tracking-wide">${estilo.label}</div>
<div class="text-slate-500 uppercase tracking-[3px] text-[10px] mt-1">Ranking mensal</div>
</div>
<div class="podium-rank ${estilo.numero} ${posicao === 1 ? 'podium-champion' : ''} text-xl font-black">${posicao}</div>
</div>

<div class="text-center my-3">
${posicao === 1 ? `<div class="podium-highlight mx-auto mb-4 rounded-full px-5 py-2 text-xs font-black uppercase tracking-[4px] text-yellow-100">Consultor do mês</div>` : ''}
<div class="mx-auto w-24 h-24 rounded-full bg-gradient-to-br ${estilo.avatar} p-[4px] ${posicao === 1 ? 'podium-champion' : ''}">
<div class="w-full h-full rounded-full bg-[#06101f] flex items-center justify-center text-3xl font-black">
${escapeHtml(iniciais(c.name))}
</div>
</div>
<div class="mt-3 flex justify-center gap-2">
<div class="podium-medal inline-flex rounded-full border border-white/10 bg-white/5 px-4 py-1 text-[10px] font-black uppercase tracking-[3px] ${estilo.titulo}">${estilo.medalha}</div>
<div class="inline-flex rounded-full border border-white/10 bg-white/5 px-4 py-1 text-[10px] font-black uppercase tracking-[3px] ${estilo.titulo}">${estilo.badge}</div>
</div>
<div class="podium-name mt-3 text-4xl font-black uppercase leading-none break-words">${escapeHtml(primeiroNome)}</div>
<div class="mt-1 text-xl font-black uppercase leading-tight text-slate-200 break-words">${escapeHtml(nomeRestante)}</div>
<div class="mt-2 text-xs uppercase tracking-widest text-slate-400 break-words">${escapeHtml(c.store || '')}</div>
</div>

<div>
<div class="text-center mb-3">
<div class="text-slate-400 uppercase text-xs tracking-widest">TKM</div>
<div class="text-4xl font-black text-green-400 mt-1">${dinheiroInteiro(c.tkm)}</div>
</div>
<div class="grid grid-cols-3 gap-3">
<div class="rounded-2xl bg-white/5 border border-white/10 p-3 text-center">
<div class="text-slate-500 uppercase text-[10px]">REV</div>
<div class="text-2xl font-black mt-1">${c.revisoes || 0}</div>
</div>
<div class="rounded-2xl bg-white/5 border border-white/10 p-3 text-center">
<div class="text-slate-500 uppercase text-[10px]">HGSI</div>
<div class="text-2xl font-black mt-1 ${classeHgsi(numero(c.hgsi))}">${numero(c.hgsi).toFixed(0)}</div>
</div>
<div class="rounded-2xl bg-white/5 border border-white/10 p-3 text-center">
<div class="text-slate-500 uppercase text-[10px]">Meta</div>
<div class="text-2xl font-black mt-1 ${classeMeta(c.pesquisasPercent)}">${c.pesquisasPercent.toFixed(0)}%</div>
</div>
</div>
</div>
</div>
</article>
`;
}

function render(){
const competencia = filtro.value;
if(!competencia){
renderCampanha();
top3.innerHTML = '';
rankingBody.innerHTML = '';
return;
}

acompanharCampanha(competencia);
podioCompetencia.innerText = `Competência ${competencia.replace('-', '/')}`;

const data = todosDados
.filter(c => c.competencia === competencia && !c.ferias);

const rankingData = agregarResultadosPorConsultor(data)
.sort((a,b)=>b.tkm - a.tkm);

rankingResumo.innerText = `${rankingData.length} consultores no ranking`;
top3.innerHTML = '';
rankingBody.innerHTML = '';

const podio = rankingData.slice(0,3);
if(podio.length === 0){
top3.innerHTML = `
<div class="xl:col-span-3 rounded-[28px] border border-slate-800 bg-white/5 p-12 text-center text-slate-500 text-2xl">
Sem dados para a competência selecionada.
</div>
`;
}else{
top3.innerHTML = podio.map((c,index)=>renderCardPodio(c,index + 1)).join('');
}

rankingData.forEach((c,i)=>{
const nomeCompleto = String(c.name || '').trim();
rankingBody.innerHTML += `
<tr class="border-b border-slate-800 hover:bg-slate-800/25 transition-all">
<td class="py-5 text-3xl font-black">${i+1}º</td>
<td>
<div class="flex items-center gap-4">
<div class="w-12 h-12 shrink-0 rounded-full bg-blue-500/20 border border-blue-400/30 flex items-center justify-center font-black text-blue-200">${escapeHtml(iniciais(nomeCompleto))}</div>
<div class="text-2xl font-black uppercase whitespace-normal break-words leading-tight max-w-[240px]">${escapeHtml(nomeCompleto)}</div>
</div>
</td>
<td class="text-slate-400 uppercase text-xl whitespace-normal break-words leading-tight max-w-[170px]">${escapeHtml(c.store || '')}</td>
<td class="text-center align-top">
<div class="font-black text-2xl ${classeHgsi(numero(c.hgsi))}">${numero(c.hgsi).toFixed(0)}</div>
<div class="mt-2 font-black text-lg ${classeMeta(c.pesquisasPercent)}">${c.pesquisasPercent.toFixed(0)}%</div>
<div class="mt-1 text-xs text-slate-500">${numero(c.pesquisas).toFixed(0)} / ${numero(c.metaPesquisas).toFixed(0)}</div>
</td>
<td class="text-center align-top">${renderSemana(c.semanas[1])}</td>
<td class="text-center align-top border-l border-slate-800">${renderSemana(c.semanas[2])}</td>
<td class="text-center align-top border-l border-slate-800">${renderSemana(c.semanas[3])}</td>
<td class="text-center align-top border-l border-slate-800">${renderSemana(c.semanas[4])}</td>
<td class="text-center align-top border-l border-slate-800">
<div class="text-blue-300 font-black text-2xl">${dinheiroInteiro(c.total)}</div>
<div class="mt-2 grid grid-cols-[48px_1fr] gap-x-2 text-sm leading-6 min-w-[150px]">
<span class="text-slate-500 font-black text-left">Serv.</span><span class="text-cyan-300 font-black text-right">${dinheiroInteiro(c.servicos)}</span>
<span class="text-slate-500 font-black text-left">Emb.</span><span class="text-pink-300 font-black text-right">${dinheiroInteiro(c.embelezamento)}</span>
<span class="text-slate-500 font-black text-left">TKM</span><span class="text-green-300 font-black text-right">${dinheiroInteiro(c.tkm)}</span>
<span class="text-slate-500 font-black text-left">REV</span><span class="text-slate-200 font-black text-right">${c.revisoes || 0}</span>
</div>
</td>
</tr>
`;
});
}

function atualizarCompetencias(){
const competenciaSelecionada = filtro.value;
const competencias = [...new Set(todosDados.filter(c=>!c.ferias).map(c=>c.competencia).filter(Boolean))].sort().reverse();
filtro.innerHTML = '';
competencias.forEach((comp)=>{
filtro.innerHTML += `<option value="${escapeHtml(comp)}">Competência: ${escapeHtml(comp.replace('-', '/'))}</option>`;
});
if(competencias.includes(competenciaSelecionada)){
filtro.value = competenciaSelecionada;
}
}

function acompanharCampanha(competencia){
if(competenciaCampanhaAtual === competencia) return;
competenciaCampanhaAtual = competencia;
campanhaAtual = null;
renderCampanha();
if(unsubscribeCampanha){
unsubscribeCampanha();
}
unsubscribeCampanha = onSnapshot(doc(db,"campanhas",competencia),(snapshot)=>{
campanhaAtual = snapshot.exists() ? snapshot.data() : null;
renderCampanha();
});
}

function renderCampanha(){
const competencia = filtro.value;
if(!competencia){
campanhaSection.classList.add('hidden');
campanhaSemanas.innerHTML = '';
return;
}

const semanas = [
{titulo:'Semana 1',periodo:'01 a 06',dados:campanhaAtual?.semana1},
{titulo:'Semana 2',periodo:'08 a 13',dados:campanhaAtual?.semana2},
{titulo:'Semana 3',periodo:'15 a 20',dados:campanhaAtual?.semana3},
{titulo:'Semana 4',periodo:'22 a 30',dados:campanhaAtual?.semana4}
];

campanhaCompetencia.innerText = `Competência ${competencia.replace('-', '/')}`;
campanhaSemanas.innerHTML = semanas.map(({titulo,periodo,dados})=>{
const normalizarVencedor = (valor)=>{
if(typeof valor === 'string'){
return {nome:valor,loja:''};
}
return {
nome:valor?.nome || '',
loja:valor?.loja || ''
};
};
const vencedores = [
{posicao:'1º',rotulo:'Primeiro',...normalizarVencedor(dados?.primeiro),classe:'text-yellow-200 border-yellow-400/40'},
{posicao:'2º',rotulo:'Segundo',...normalizarVencedor(dados?.segundo),classe:'text-slate-100 border-slate-300/30'},
{posicao:'3º',rotulo:'Terceiro',...normalizarVencedor(dados?.terceiro),classe:'text-orange-200 border-orange-400/35'}
];
return `
<div class="rounded-3xl border border-slate-800 bg-[#050b18]/70 p-5">
<div class="flex justify-between items-start gap-3 mb-4">
<div>
<div class="text-2xl font-black">${titulo}</div>
<div class="text-slate-500 uppercase tracking-widest text-xs mt-1">${periodo}</div>
</div>
</div>
<div class="space-y-3">
${vencedores.map(v=>`
<div class="${v.classe} border rounded-2xl p-4">
<div class="flex gap-3 items-start">
<div class="text-xl font-black min-w-[36px]">${v.posicao}</div>
<div>
<div class="text-slate-500 uppercase text-xs tracking-widest">${v.rotulo}</div>
<div class="text-xl font-black uppercase leading-tight break-words">${escapeHtml(v.nome || 'A definir')}</div>
${v.loja ? `<div class="text-xs uppercase tracking-widest text-slate-400 mt-1 break-words">${escapeHtml(v.loja)}</div>` : ''}
</div>
</div>
</div>
`).join('')}
</div>
</div>
`;
}).join('');
campanhaSection.classList.remove('hidden');
}

setInterval(atualizarRelogio,1000);
atualizarRelogio();

onSnapshot(collection(db,"consultores"),(snapshot)=>{
todosDados = [];
snapshot.forEach((docu)=>{
todosDados.push(docu.data());
});
atualizarCompetencias();
render();
});

onSnapshot(collection(db,"consultores_cadastro"),(snapshot)=>{
cadastrosConsultores = [];
snapshot.forEach((docu)=>{
cadastrosConsultores.push({
id:docu.id,
...docu.data()
});
});
render();
});

filtro.addEventListener('change',render);
</script>
</body>
</html>
