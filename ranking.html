<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>RANKING CONSULTORES</title><script src="https://cdn.tailwindcss.com"></script><style>body{background: radial-gradient(circle at top left, #0f172a, #020617 70%);} .glass{background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05);} .glow-gold{box-shadow: 0 0 30px rgba(234, 179, 8, 0.2);} .glow-silver{box-shadow: 0 0 30px rgba(148, 163, 184, 0.2);} .glow-bronze{box-shadow: 0 0 30px rgba(194, 65, 12, 0.2);}</style></head><body class="text-slate-100 min-h-screen p-4 md:p-8"><div class="max-w-[1600px] mx-auto"><header class="flex flex-col lg:flex-row justify-between items-center gap-8 mb-12"><div class="flex items-center gap-6"><div class="w-3 h-16 bg-blue-500 rounded-full"></div><div><h1 class="text-4xl md:text-6xl font-extrabold tracking-tighter">RANKING <span class="text-blue-500">CONSULTORES</span></h1><p class="text-slate-400">Dashboard de Performance em Tempo Real</p></div></div><div class="flex gap-4"><select id="filtroCompetencia" class="bg-slate-900 border border-slate-700 rounded-xl px-6 py-4 text-lg outline-none focus:border-blue-500 transition-all"></select><div class="glass rounded-xl px-8 py-4 text-center"><div id="clock" class="text-2xl font-mono font-bold">00:00:00</div><div id="date" class="text-xs text-slate-400 uppercase tracking-widest">00/00/0000</div></div></div></header><div id="top3" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12"></div><div class="glass rounded-3xl p-6 md:p-8"><div class="flex justify-between items-center mb-8"><h2 class="text-2xl font-bold">Ranking Geral</h2><div class="flex items-center gap-2 text-xs text-emerald-400 bg-emerald-950/30 px-3 py-1 rounded-full border border-emerald-900/50">● AO VIVO</div></div><div class="overflow-x-auto"><table class="w-full text-left border-collapse"><thead><tr class="text-slate-500 text-xs uppercase tracking-wider border-b border-slate-800"><th class="pb-4">Pos</th><th class="pb-4">Consultor</th><th class="pb-4">Loja</th><th class="pb-4 text-center">REV</th><th class="pb-4 text-center">Total</th><th class="pb-4 text-center">TKM</th><th class="pb-4 text-center">HGSI</th><th class="pb-4 text-center">Meta</th></tr></thead><tbody id="ranking-body"></tbody></table></div></div></div><script type="module">import { db } from './firebase-config.js'; import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"; const top3 = document.getElementById('top3'); const rankingBody = document.getElementById('ranking-body'); const filtro = document.getElementById('filtroCompetencia'); let todosDados = []; function updateClock(){ const now = new Date(); document.getElementById('clock').innerText = now.toLocaleTimeString('pt-BR'); document.getElementById('date').innerText = now.toLocaleDateString('pt-BR'); } setInterval(updateClock, 1000); updateClock(); onSnapshot(collection(db, "consultores"), (snapshot) => { todosDados = snapshot.docs.map(d => d.data()); const comps = [...new Set(todosDados.map(c => c.competencia))].sort().reverse(); filtro.innerHTML = comps.map(c => `<option value="${c}">Competência: ${c.replace('-', '/')}</option>`).join(''); render(); }); filtro.addEventListener('change', render); function render() { const data = todosDados.filter(c => c.competencia === filtro.value).sort((a, b) => ((b.serv_adic + b.emb_oficina) / (b.rev_und || 1)) - ((a.serv_adic + a.emb_oficina) / (a.rev_und || 1))); top3.innerHTML = ''; rankingBody.innerHTML = ''; data.forEach((c, i) => { const total = c.serv_adic + c.emb_oficina; const tkm = c.rev_und > 0 ? total / c.rev_und : 0; const metaP = c.meta_pesquisas > 0 ? (c.pesquisas / c.meta_pesquisas) * 100 : 0; const mColor = metaP >= 100 ? 'text-emerald-400' : metaP >= 90 ? 'text-yellow-400' : 'text-red-400'; const hColor = c.hgsi >= 970 ? 'text-emerald-400' : c.hgsi >= 960 ? 'text-yellow-400' : 'text-red-400'; if (i < 3) { const styles = ["from-yellow-900/40 to-transparent border-yellow-600/30 glow-gold", "from-slate-700/40 to-transparent border-slate-600/30 glow-silver", "from-orange-900/40 to-transparent border-orange-700/30 glow-bronze"]; top3.innerHTML += `<div class="glass p-6 rounded-3xl border bg-gradient-to-b ${styles[i]}"><div class="text-4xl mb-4">${['🥇','🥈','🥉'][i]}</div><div class="text-xl font-bold">${c.name}</div><div class="text-sm text-slate-400 mb-6">${c.store}</div><div class="text-4xl font-black">R$ ${tkm.toFixed(0)}</div><div class="text-xs text-slate-500 uppercase">TKM Médio</div></div>`; } rankingBody.innerHTML += `<tr class="border-b border-slate-800/50 hover:bg-slate-800/30 transition-colors"><td class="py-4 font-bold">${i+1}º</td><td class="font-semibold">${c.name}</td><td class="text-slate-400">${c.store}</td><td class="text-center">${c.rev_und}</td><td class="text-center font-bold">R$ ${total.toLocaleString()}</td><td class="text-center font-bold text-blue-400">R$ ${tkm.toFixed(0)}</td><td class="text-center font-bold ${hColor}">${c.hgsi}</td><td class="text-center font-bold ${mColor}">${metaP.toFixed(0)}%</td></tr>`; }); }</script></body></html>
