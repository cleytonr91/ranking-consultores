<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ranking GP Performance</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-950 text-white p-6">

<div class="max-w-7xl mx-auto">

<div class="flex justify-between items-center mb-8">

<div>

<h1 class="text-5xl font-black italic">
GP PERFORMANCE
</h1>

<p class="text-slate-500 uppercase tracking-widest mt-2">
Ranking Consultores
</p>

</div>

<select id="filtroCompetencia"
class="bg-slate-900 rounded-xl p-4">

</select>

</div>

<div id="ranking" class="space-y-4">

</div>

</div>

<script type="module">

import { db } from './firebase-config.js';

import {
collection,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ranking =
document.getElementById('ranking');

const filtro =
document.getElementById('filtroCompetencia');

let todosDados = [];

onSnapshot(collection(db,"consultores"),(snapshot)=>{

todosDados = [];

snapshot.forEach((doc)=>{

todosDados.push(doc.data());

});

const competencias =
[...new Set(
todosDados.map(c=>c.competencia)
)];

filtro.innerHTML = '';

competencias.sort().reverse();

competencias.forEach((comp)=>{

filtro.innerHTML += `
<option value="${comp}">
${comp}
</option>
`;

});

render();

});

filtro.addEventListener('change',render);

function render(){

const competencia =
filtro.value;

const data =
todosDados.filter(
c=>c.competencia === competencia
);

data.sort((a,b)=>{

const tkmA =
(a.serv_adic + a.emb_oficina)
/ a.rev_und;

const tkmB =
(b.serv_adic + b.emb_oficina)
/ b.rev_und;

return tkmB - tkmA;

});

ranking.innerHTML = '';

data.forEach((c,i)=>{

const total =
c.serv_adic + c.emb_oficina;

const tkm =
c.rev_und > 0
? total / c.rev_und
: 0;

ranking.innerHTML += `

<div class="bg-slate-900 rounded-2xl p-6">

<div class="flex justify-between items-center">

<div>

<div class="text-3xl font-black">
#${i + 1} ${c.name}
</div>

<div class="text-slate-500 uppercase mt-2">
${c.store}
</div>

</div>

<div class="grid grid-cols-4 gap-4">

<div class="bg-slate-950 rounded-xl p-4 text-center">

<div class="text-slate-500 text-xs uppercase">
REV
</div>

<div class="text-2xl font-black mt-2">
${c.rev_und}
</div>

</div>

<div class="bg-slate-950 rounded-xl p-4 text-center">

<div class="text-slate-500 text-xs uppercase">
TOTAL
</div>

<div class="text-2xl font-black text-blue-400 mt-2">
R$ ${total.toFixed(0)}
</div>

</div>

<div class="bg-slate-950 rounded-xl p-4 text-center">

<div class="text-slate-500 text-xs uppercase">
TKM
</div>

<div class="text-2xl font-black text-green-400 mt-2">
R$ ${tkm.toFixed(0)}
</div>

</div>

<div class="bg-slate-950 rounded-xl p-4 text-center">

<div class="text-slate-500 text-xs uppercase">
HGSI
</div>

<div class="text-2xl font-black mt-2
${c.hgsi >= 970
? 'text-green-400'
: c.hgsi >= 960
? 'text-yellow-400'
: 'text-red-500'}
">
${c.hgsi}
</div>

</div>

</div>

</div>

</div>

`;

});

}

</script>

</body>

</html>
