<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GP Performance</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

.ranking-item {
transition: all 0.5s;
}

.gold {
background: #3d3200;
border-left: 10px solid gold;
}

.silver {
background: #2f2f2f;
border-left: 10px solid silver;
}

.bronze {
background: #352000;
border-left: 10px solid #cd7f32;
}

</style>

</head>

<body class="bg-black text-white p-6 font-sans">

<h1 class="text-6xl font-black italic mb-8">
GP PERFORMANCE
</h1>

<div id="ranking" class="flex flex-col gap-4"></div>

<script type="module">

import { db } from './firebase-config.js';

import {
collection,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ranking = document.getElementById('ranking');

onSnapshot(collection(db, "consultores"), (snapshot) => {

let data = [];

snapshot.forEach((doc) => {

data.push({
id: doc.id,
...doc.data()
});

});

data.sort((a, b) => {

const tkmA = a.rev_und > 0
? (a.serv_adic + a.emb_oficina) / a.rev_und
: 0;

const tkmB = b.rev_und > 0
? (b.serv_adic + b.emb_oficina) / b.rev_und
: 0;

return tkmB - tkmA;

});

ranking.innerHTML = '';

data.forEach((c, i) => {

let style = 'bg-slate-900';

if (i === 0) style = 'gold';
if (i === 1) style = 'silver';
if (i === 2) style = 'bronze';

const totalPen = c.serv_adic + c.emb_oficina;

const tkm = c.rev_und > 0
? totalPen / c.rev_und
: 0;

ranking.innerHTML += `

<div class="ranking-item ${style} p-6 rounded-xl grid grid-cols-6 gap-4 items-center">

<div>
<div class="text-4xl font-black">
#${i + 1}
</div>
</div>

<div>
<div class="text-3xl font-black uppercase">
${c.name}
</div>

<div class="text-slate-400">
${c.store}
</div>
</div>

<div>
<div class="text-sm text-slate-500">
REV
</div>

<div class="text-3xl font-black">
${c.rev_und}
</div>
</div>

<div>
<div class="text-sm text-slate-500">
TOTAL
</div>

<div class="text-3xl font-black text-blue-400">
R$ ${totalPen.toFixed(0)}
</div>
</div>

<div>
<div class="text-sm text-slate-500">
TKM
</div>

<div class="text-5xl font-black text-green-400">
R$ ${tkm.toFixed(0)}
</div>
</div>

<div>
<div class="text-sm text-slate-500">
HGSI
</div>

<div class="text-4xl font-black text-yellow-400">
${c.hgsi}
</div>
</div>

</div>

`;

});

});

</script>

</body>
</html>
